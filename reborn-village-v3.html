<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REBORN: Another World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
body{font-family:'Press Start 2P',monospace;cursor:none;}
#gameContainer{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#cursor{position:fixed;width:12px;height:12px;background:#fff;pointer-events:none;z-index:9999;box-shadow:0 0 8px #fff,0 0 20px #88ffcc;transform:translate(-50%,-50%);}
#scanlines{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:200;}
#vignette{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.6) 100%);pointer-events:none;z-index:201;}

/* CUSTOM SCREEN */
#customScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.97);z-index:500;display:none;flex-direction:column;align-items:center;overflow:hidden;font-family:'Press Start 2P',monospace;}
#customScreen.active{display:flex;}
.cs-header{width:100%;padding:12px 16px 8px;border-bottom:2px solid #1a4433;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.cs-title{font-size:9px;color:#88ffcc;letter-spacing:2px;text-shadow:0 0 10px #88ffcc66;}
.cs-step-badge{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:7px;color:#445544;}
.cs-tabs{display:flex;width:100%;border-bottom:1px solid #1a3322;flex-shrink:0;overflow-x:auto;}
.cs-tabs::-webkit-scrollbar{display:none;}
.cs-tab{flex:1;min-width:60px;padding:10px 4px;text-align:center;font-size:6px;color:#446644;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.cs-tab.active{color:#88ffcc;border-bottom-color:#88ffcc;}
.cs-tab-icon{font-size:14px;display:block;margin-bottom:3px;}
.cs-preview{display:flex;flex-direction:column;align-items:center;padding:12px 16px 8px;flex-shrink:0;}
.cs-preview-canvas-wrap{width:100px;height:130px;border:2px solid #1a4433;background:#0a1a0f;display:flex;align-items:center;justify-content:center;}
#previewCanvas{image-rendering:pixelated;display:block;}
.cs-name-display{margin-top:8px;font-size:7px;color:#88ffcc;text-align:center;min-height:14px;letter-spacing:1px;}
.cs-panel{flex:1;width:100%;overflow-y:auto;padding:12px 16px 80px;}
.cs-panel::-webkit-scrollbar{display:none;}
.cs-section-label{font-size:6px;color:#446655;margin-bottom:8px;letter-spacing:1px;}
.cs-gender-row{display:flex;gap:8px;margin-bottom:16px;}
.cs-gender-btn{flex:1;padding:14px 8px;border:2px solid #224433;background:#0a1a0f;color:#446644;font-size:7px;font-family:'Press Start 2P',monospace;cursor:pointer;text-align:center;line-height:1.8;}
.cs-gender-btn.active{border-color:#88ffcc;color:#88ffcc;background:#0a2a1a;}
.cs-gender-btn .g-icon{font-size:22px;display:block;margin-bottom:4px;}
.cs-name-wrap{margin-bottom:16px;}
.cs-name-input{width:100%;padding:12px;background:#0a1a0f;border:2px solid #224433;color:#88ffcc;font-size:8px;font-family:'Press Start 2P',monospace;outline:none;caret-color:#88ffcc;}
.cs-name-input:focus{border-color:#55aa77;}
.cs-name-input::placeholder{color:#334433;}
.cs-name-counter{text-align:right;font-size:6px;color:#334433;margin-top:4px;}
.cs-palette{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.cs-color-swatch{width:36px;height:36px;border:2px solid transparent;cursor:pointer;transition:transform .1s;flex-shrink:0;}
.cs-color-swatch.active{border-color:#88ffcc;transform:scale(1.1);}
.cs-color-swatch.dark-check.active{border-color:#fff;}
.cs-option-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.cs-option-btn{aspect-ratio:1;background:#0a1a0f;border:2px solid #1a3322;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:4px;}
.cs-option-btn.active{border-color:#88ffcc;background:#0a2a18;}
.cs-option-btn canvas{image-rendering:pixelated;display:block;}
.cs-action-bar{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:600;border-top:2px solid #1a4433;background:#04080a;}
.cs-btn-prev{flex:1;padding:16px 8px;background:#0a1208;border:none;border-right:1px solid #1a3322;color:#446644;font-size:7px;font-family:'Press Start 2P',monospace;cursor:pointer;}
.cs-btn-next{flex:2;padding:16px 8px;background:#0a2018;border:none;color:#88ffcc;font-size:7px;font-family:'Press Start 2P',monospace;cursor:pointer;position:relative;overflow:hidden;}
.cs-btn-next::after{content:'';position:absolute;top:0;left:-100%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(136,255,204,.1),transparent);animation:shimmer 2s infinite;}
@keyframes shimmer{to{left:200%;}}
.cs-btn-next.confirm{background:#0a3020;border:2px solid #55cc88;}

/* INVENTORY / WARDROBE OVERLAY */
#overlayScreen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.96);
  z-index:600;
  display:none;
  flex-direction:column;
  font-family:'Press Start 2P',monospace;
}
#overlayScreen.active{display:flex;}
.ov-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:2px solid #1a4433;flex-shrink:0;}
.ov-title{font-size:9px;color:#88ffcc;letter-spacing:2px;}
.ov-close{background:none;border:1px solid #446644;color:#88ffcc;font-size:8px;font-family:'Press Start 2P',monospace;padding:6px 10px;cursor:pointer;}
.ov-tabs{display:flex;border-bottom:1px solid #1a3322;flex-shrink:0;}
.ov-tab{flex:1;padding:10px 4px;text-align:center;font-size:7px;color:#446644;cursor:pointer;border-bottom:2px solid transparent;}
.ov-tab.active{color:#88ffcc;border-bottom-color:#88ffcc;}
.ov-body{flex:1;overflow:hidden;display:flex;gap:0;}
/* Inventory panel */
.inv-grid{flex:1;padding:10px;overflow-y:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-content:start;}
.inv-grid::-webkit-scrollbar{display:none;}
.inv-slot{aspect-ratio:1;background:#0a1208;border:2px solid #1a3322;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;padding:3px;}
.inv-slot.has-item{border-color:#334433;}
.inv-slot.selected{border-color:#88ffcc;background:#0a2a18;}
.inv-slot.equipped{border-color:#ffcc44;background:#1a1a08;}
.inv-slot .slot-icon{font-size:18px;line-height:1;}
.inv-slot .slot-name{font-size:4px;color:#557755;margin-top:2px;text-align:center;line-height:1.3;}
.inv-slot .slot-qty{position:absolute;bottom:2px;right:3px;font-size:4px;color:#88ffcc;}
.inv-slot .slot-eq{position:absolute;top:2px;left:2px;font-size:6px;}
.inv-detail{width:160px;flex-shrink:0;padding:10px;border-left:1px solid #1a3322;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.inv-detail::-webkit-scrollbar{display:none;}
.inv-det-icon{font-size:32px;text-align:center;}
.inv-det-name{font-size:7px;color:#88ffcc;text-align:center;line-height:1.6;}
.inv-det-type{font-size:5px;color:#446655;text-align:center;}
.inv-det-desc{font-size:5px;color:#aaccaa;line-height:1.8;padding:4px;border:1px solid #1a3322;background:#050c08;}
.inv-det-stats{font-size:5px;color:#88ffcc;line-height:2;}
.inv-det-btn{padding:8px;background:#0a2018;border:1px solid #44aa66;color:#88ffcc;font-size:6px;font-family:'Press Start 2P',monospace;cursor:pointer;text-align:center;}
.inv-det-btn:hover{background:#0a3020;}
.inv-det-btn.red{border-color:#aa4433;color:#ff8877;background:#1a0a08;}
/* Wardrobe panel */
.ward-body{flex:1;display:flex;overflow:hidden;}
.ward-preview{width:140px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:12px 8px;border-right:1px solid #1a3322;gap:6px;}
.ward-canvas-wrap{width:90px;height:120px;border:2px solid #1a4433;background:#0a1a0f;display:flex;align-items:center;justify-content:center;}
#wardCanvas{image-rendering:pixelated;}
.ward-slots{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:100%;}
.ward-eq-slot{background:#0a1208;border:1px solid #1a3322;padding:4px;font-size:4px;color:#446655;text-align:center;cursor:pointer;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.ward-eq-slot.has-item{border-color:#334433;color:#88ffcc;}
.ward-eq-slot .ward-slot-icon{font-size:14px;}
.ward-right{flex:1;overflow-y:auto;padding:8px;}
.ward-right::-webkit-scrollbar{display:none;}
.ward-category-label{font-size:6px;color:#446655;margin:8px 0 4px;letter-spacing:1px;}
.ward-item-row{display:flex;align-items:center;gap:8px;padding:6px;border:1px solid #1a3322;background:#050c08;margin-bottom:4px;cursor:pointer;}
.ward-item-row.selected{border-color:#88ffcc;background:#0a1a10;}
.ward-item-row.equipped{border-color:#ffcc44;background:#0a0a00;}
.ward-item-icon{font-size:18px;flex-shrink:0;}
.ward-item-info{flex:1;}
.ward-item-name{font-size:6px;color:#88ffcc;margin-bottom:3px;}
.ward-item-stat{font-size:5px;color:#557755;}
.ward-item-eq{font-size:5px;color:#ffcc44;}
</style>
</head>
<body>
<div id="gameContainer"><canvas id="gameCanvas"></canvas></div>
<div id="scanlines"></div><div id="vignette"></div><div id="cursor"></div>

<!-- CUSTOM SCREEN -->
<div id="customScreen">
  <div class="cs-header"><div class="cs-title">✦ BUAT KARAKTERMU ✦</div><div class="cs-step-badge" id="stepBadge">1/5</div></div>
  <div class="cs-tabs">
    <div class="cs-tab active" data-tab="identity" onclick="switchTab('identity')"><span class="cs-tab-icon">⚔</span>IDENTITAS</div>
    <div class="cs-tab" data-tab="skin" onclick="switchTab('skin')"><span class="cs-tab-icon">◈</span>KULIT</div>
    <div class="cs-tab" data-tab="hair" onclick="switchTab('hair')"><span class="cs-tab-icon">≋</span>RAMBUT</div>
    <div class="cs-tab" data-tab="outfit" onclick="switchTab('outfit')"><span class="cs-tab-icon">▣</span>PAKAIAN</div>
    <div class="cs-tab" data-tab="face" onclick="switchTab('face')"><span class="cs-tab-icon">◉</span>WAJAH</div>
  </div>
  <div class="cs-preview"><div class="cs-preview-canvas-wrap"><canvas id="previewCanvas" width="80" height="110"></canvas></div><div class="cs-name-display" id="nameDisplay">???</div></div>
  <div class="cs-panel" id="csPanel"></div>
  <div class="cs-action-bar"><button class="cs-btn-prev" onclick="prevTab()">◀ KEMBALI</button><button class="cs-btn-next" id="csNextBtn" onclick="nextTab()">LANJUT ▶</button></div>
</div>

<!-- INVENTORY / WARDROBE OVERLAY -->
<div id="overlayScreen">
  <div class="ov-header">
    <div class="ov-title" id="ovTitle">✦ INVENTORI ✦</div>
    <button class="ov-close" onclick="closeOverlay()">✕ TUTUP</button>
  </div>
  <div class="ov-tabs">
    <div class="ov-tab active" onclick="switchOvTab('inventory')">📦 INVENTORI</div>
    <div class="ov-tab" onclick="switchOvTab('wardrobe')">👕 LEMARI</div>
    <div class="ov-tab" onclick="switchOvTab('weapons')">⚔ SENJATA</div>
  </div>
  <div class="ov-body" id="ovBody"></div>
</div>

<script>
// ===================== CORE =====================
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
let lastTime=0,deltaTime=0;
function resize(){const s=Math.min(window.innerWidth/480,window.innerHeight/320);canvas.width=480;canvas.height=320;canvas.style.width=Math.floor(480*s)+'px';canvas.style.height=Math.floor(320*s)+'px';}
resize();window.addEventListener('resize',resize);
const cursorEl=document.getElementById('cursor');
window.addEventListener('mousemove',e=>{cursorEl.style.left=e.clientX+'px';cursorEl.style.top=e.clientY+'px';});

// ===================== AUDIO =====================
let audioCtx=null,isMuted=false,bgmInterval=null,indoorBgmInterval=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
let _masterNode=null;
function getMaster(){if(!audioCtx)return null;if(!_masterNode){_masterNode=audioCtx.createGain();_masterNode.gain.value=isMuted?0:0.18;_masterNode.connect(audioCtx.destination);}return _masterNode;}
function playNote(freq,type='sine',dur=0.3,vol=0.12,delay=0){
  if(!audioCtx||isMuted)return;const m=getMaster();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;const t=audioCtx.currentTime+delay;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(m);o.start(t);o.stop(t+dur+0.05);
}
const VS=[261.63,293.66,329.63,392,440,523.25,587.33,659.25];
const VB=[65.41,73.42,82.41,98];
const VM=[0,2,4,5,4,2,4,7,5,4,2,0,2,4,2,0,0,4,5,7,5,4,7,5,2,4,5,2,0,2,4,0];
const VBP=[0,0,2,2,1,1,3,3,0,0,2,2,1,1,3,3,0,0,1,1,2,2,3,3,0,0,2,2,1,1,0,0];
let bgmBeat=0;
function startVillageBGM(){if(bgmInterval)return;initAudio();if(!audioCtx)return;bgmBeat=0;const beat=60/88;bgmInterval=setInterval(()=>{if(!audioCtx||isMuted)return;const b=bgmBeat%32;playNote(VS[VM[b]]*2,'triangle',beat*0.7,0.10);if(b%2===0){playNote(VB[VBP[b]],'triangle',beat*1.8,0.13);if(b%8===0){[[130.81,164.81,196],[146.83,185,220],[164.81,196,246.94],[123.47,155.56,185]][Math.floor(b/8)%4].forEach(f=>playNote(f,'sine',beat*7.5,0.035));}}bgmBeat++;},beat*1000);}
function stopVillageBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}}
let indoorBeat=0;
const IS=[261.63,277.18,311.13,349.23,392,415.3,466.16,523.25];
const IM=[0,2,4,6,4,2,0,1,2,4,6,7,6,4,2,0];
function startIndoorBGM(){if(indoorBgmInterval)return;initAudio();if(!audioCtx)return;indoorBeat=0;const beat=60/60;indoorBgmInterval=setInterval(()=>{if(!audioCtx||isMuted)return;const b=indoorBeat%16;const f=IS[IM[b]];playNote(f,'sine',beat*1.8,0.07);if(b%4===0)playNote(f*0.5,'triangle',beat*3.5,0.055);if(b%8===0)[f*0.75,f,f*1.25].forEach(ff=>playNote(ff,'sine',beat*7,0.022));indoorBeat++;},beat*1000);}
function stopIndoorBGM(){if(indoorBgmInterval){clearInterval(indoorBgmInterval);indoorBgmInterval=null;}}
function sfxDoor(){if(!audioCtx||isMuted)return;[400,300,200].forEach((f,i)=>playNote(f,'triangle',0.15,0.08,i*0.08));}
function sfxSelect(){if(!audioCtx||isMuted)return;playNote(660,'triangle',0.06,0.06);}
function sfxEquip(){if(!audioCtx||isMuted)return;[440,550,660].forEach((f,i)=>playNote(f,'square',0.08,0.07,i*0.05));}
function sfxStep(){if(!audioCtx||isMuted)return;playNote(120+Math.random()*60,'sine',0.04,0.03);}
function sfxAttack(){if(!audioCtx||isMuted)return;playNote(180,'sawtooth',0.12,0.15);playNote(220,'square',0.08,0.08,0.05);}
function toggleMute(){isMuted=!isMuted;if(_masterNode)_masterNode.gain.value=isMuted?0:0.18;}

// ===================== GAME STATE =====================
const SCENES={DEATH:'death',VOID:'void',REBORN:'reborn',VILLAGE:'village',INDOOR:'indoor'};
let scene=SCENES.DEATH,tick=0;
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key==='i'||e.key==='I')&&(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)){openOverlay('inventory');}
  if((e.key==='c'||e.key==='C')&&(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)){openOverlay('wardrobe');}
  if(e.key==='m'||e.key==='M'){toggleMute();}
  if(e.key==='Escape'&&overlayOpen){closeOverlay();}
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function lerpColor(c1,c2,t){const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);return `rgb(${Math.floor(lerp(r1,r2,t))},${Math.floor(lerp(g1,g2,t))},${Math.floor(lerp(b1,b2,t))})`;}
function pixelText(t,x,y,size,color,align='left'){ctx.save();ctx.font=`${size}px "Press Start 2P"`;ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline='top';ctx.imageSmoothingEnabled=false;ctx.fillText(t,x,y);ctx.restore();}
function drawRect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(Math.floor(x),Math.floor(y),Math.floor(w),Math.floor(h));}
function noise(x,y,s){let n=Math.sin(x*127.1+y*311.7+s*17.3)*43758.5453;return n-Math.floor(n);}
function blendColor(hex,amt){let r,g,b;if(hex.startsWith('#')){r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16);}else{const m=hex.match(/\d+/g);if(!m)return hex;r=+m[0];g=+m[1];b=+m[2];}return `rgb(${clamp(r+amt,0,255)},${clamp(g+amt,0,255)},${clamp(b+amt,0,255)})`;}

// Particles
let particles=[];
function spawnP(x,y,vx,vy,life,color,size=2){particles.push({x,y,vx,vy,life,maxLife:life,color,size});}
function updateP(dt){particles=particles.filter(p=>p.life>0);for(let p of particles){p.x+=p.vx*(dt*60);p.y+=p.vy*(dt*60);p.vy+=0.02*(dt*60);p.vx*=Math.pow(0.98,dt*60);p.life-=(dt*60);ctx.globalAlpha=Math.max(0,p.life/p.maxLife);drawRect(Math.floor(p.x),Math.floor(p.y),p.size,p.size,p.color);ctx.globalAlpha=1;}}

const stars=Array.from({length:120},(_,i)=>({x:noise(i,0,1)*480,y:noise(i,0,2)*320,bright:noise(i,0,3),ts:.02+noise(i,0,4)*.04,size:noise(i,0,5)<.85?1:2}));
function drawStars(a=1){for(let s of stars){const tw=(Math.sin(tick*s.ts+s.bright*10)+1)*.5;ctx.globalAlpha=(0.3+tw*.7)*a;drawRect(Math.floor(s.x),Math.floor(s.y),s.size,s.size,'#fff');}ctx.globalAlpha=1;}

// ===================== CHAR CONFIG =====================
const charConfig={gender:'male',name:'',skinTone:'#f5c89a',hairStyle:0,hairColor:'#3a2a1a',outfitStyle:0,outfitColor:'#ccddee',faceStyle:0,shoeColor:'#3a2a1a',bodyType:0,eyeColor:'#88ffcc'};
const SKIN_TONES=['#fce4c8','#f5c89a','#e8a87c','#c87941','#a05c28','#7a3e1a','#4a2010'];
const HAIR_COLORS=['#111','#3a2a1a','#7a4a1a','#c8a050','#e8d080','#cc4444','#4455cc','#44aacc','#ccc','#fff'];
const OUTFIT_COLORS=['#ccddee','#2a4a6c','#cc4433','#3a6a2a','#8a2a8a','#ccaa44','#444','#eee'];
const SHOE_COLORS=['#3a2a1a','#111','#666','#8a3a1a','#2a4a6c','#4a8a4a','#cc4433'];
const EYE_COLORS=['#88ffcc','#4488ff','#ff8844','#aa44ff','#44ffaa','#ffcc44','#ff4488','#888'];
const HAIR_STYLES=['PENDEK','PANJANG','JABRIK','IKAL','PLONTOS','EKOR KUDA','MOHAWK','TERURAI'];
const OUTFIT_STYLES=['JUBAH','PRAJURIT','MAGE','PETANI','PENCURI','SAMURAI','RANGER','SULTAN'];
const FACE_STYLES=['BIASA','LUKA','TATO','KUMIS','JENGGOT','KACAMATA','TOPENG','BEKAS LUKA'];

// ===================== INVENTORY DATA =====================
const ITEM_DB = {
  // WEAPONS
  rusty_sword:   {name:'Pedang Berkarat',icon:'🗡',type:'weapon',slot:'weapon',atk:8,def:0,spd:0,desc:'Pedang tua yang sudah berkarat. Masih cukup tajam.',color:'#888'},
  iron_sword:    {name:'Pedang Besi',icon:'⚔',type:'weapon',slot:'weapon',atk:15,def:0,spd:-1,desc:'Pedang besi standar. Andalan para prajurit.',color:'#aaa'},

function buildInventoryUI(){
  const slots=[];
  // 25 slots total
  for(let i=0;i<25;i++){
    const it=inventory.items[i];
    if(it&&ITEM_DB[it.id]){
      const db=ITEM_DB[it.id];
      const isEq=Object.values(inventory.equipped).includes(it.id);
      const isSel=selectedInvSlot===i;
      slots.push(`<div class="inv-slot has-item${isEq?' equipped':''}${isSel?' selected':''}" onclick="selectInvSlot(${i})">
        ${isEq?'<span class="slot-eq">★</span>':''}
        <span class="slot-icon">${db.icon}</span>
        <span class="slot-name">${db.name}</span>
        ${it.qty>1?`<span class="slot-qty">x${it.qty}</span>`:''}
      </div>`);
    } else {
      slots.push(`<div class="inv-slot" onclick="selectInvSlot(${i})"></div>`);
    }
  }
  const det=buildItemDetail();
  const stats=getEquippedStats();
  return `
    <div class="inv-grid">${slots.join('')}</div>
    <div class="inv-detail">
      <div style="font-size:5px;color:#446655;margin-bottom:6px">STATISTIK</div>

      <hr style="border:none;border-top:1px solid #1a3322;margin:4px 0">
      ${det}
    </div>`;
}

function buildItemDetail(){
  if(selectedInvSlot===null||!inventory.items[selectedInvSlot])return`<div style="font-size:5px;color:#334433;text-align:center;margin-top:20px">Pilih item</div>`;
  const it=inventory.items[selectedInvSlot],db=ITEM_DB[it.id];
  if(!db)return'';
  const isEq=inventory.equipped[db.slot]===it.id;
  const canEquip=db.slot!==null;
  const canUse=db.type==='consumable';
  return`
    <div class="inv-det-icon">${db.icon}</div>
    <div class="inv-det-name">${db.name}</div>
    <div class="inv-det-type">${db.type.toUpperCase()}${db.slot?' • '+db.slot.toUpperCase():''}</div>
    <div class="inv-det-desc">${db.desc}</div>
    ${db.atk||db.def||db.spd?`<div class="inv-det-stats">${db.atk?`⚔ +${db.atk}ATK `:''} ${db.def?`🛡 +${db.def}DEF `:''}${db.spd?`💨 ${db.spd>0?'+':''}${db.spd}SPD`:''}</div>`:''}
    ${canEquip?`<button class="inv-det-btn${isEq?' red':''}" onclick="toggleEquip('${it.id}')">${isEq?'✕ LEPAS':'✓ PAKAI'}</button>`:''}
    ${canUse?`<button class="inv-det-btn" onclick="useItem('${it.id}')">▶ GUNAKAN</button>`:''}
    <button class="inv-det-btn red" style="margin-top:2px" onclick="dropItem(${selectedInvSlot})">🗑 BUANG</button>`;
}

function selectInvSlot(i){selectedInvSlot=i;sfxSelect();renderOverlay();}
function toggleEquip(id){
  const db=ITEM_DB[id];if(!db||!db.slot)return;
  if(inventory.equipped[db.slot]===id){inventory.equipped[db.slot]=null;}
  else{inventory.equipped[db.slot]=id;}
  sfxEquip();
  // Sync charConfig with equipped outfit/shoe color
  if(db.slot==='body'&&db.color)charConfig.outfitColor=db.color;
  if(db.slot==='feet'&&db.color)charConfig.shoeColor=db.color;
  renderOverlay();
}
function useItem(id){
  const db=ITEM_DB[id];if(!db||db.type!=='consumable')return;
  if(db.name.includes('HP')||db.name.includes('Roti')){vPlayer.hp=Math.min(vPlayer.maxHp,vPlayer.hp+(db.name.includes('HP')?30:10));notification={text:db.icon+' +HP! ('+db.name+')',timer:90};}
  // Remove one qty
  const it=inventory.items.find(x=>x.id===id);if(it){it.qty--;if(it.qty<=0)inventory.items=inventory.items.filter(x=>x.id!==id);}
  sfxEquip();selectedInvSlot=null;renderOverlay();
}
function dropItem(i){
  inventory.items.splice(i,1);selectedInvSlot=null;sfxSelect();renderOverlay();
}

// Ward canvas preview
const wardCanvasEl={el:null,ctx:null};
function getWardCanvas(){
  wardCanvasEl.el=document.getElementById('wardCanvas');
  if(wardCanvasEl.el)wardCanvasEl.ctx=wardCanvasEl.el.getContext('2d');
  return wardCanvasEl;
}
function drawWardCanvas(){
  const wc=getWardCanvas();if(!wc.el||!wc.ctx)return;
  const wctx=wc.ctx;wctx.clearRect(0,0,70,100);
  const cfg=charConfig,isFemale=cfg.gender==='female';
  const cx=35,cy=60;
  const bw=isFemale?12:14,bh=isFemale?14:12;
  const hw=isFemale?10:12,hh=isFemale?11:10;
  const legW=isFemale?4:5;
  // Shadow
  wctx.globalAlpha=.25;wctx.fillStyle='#000';wctx.beginPath();wctx.ellipse(cx,cy+16,10,3,0,0,Math.PI*2);wctx.fill();wctx.globalAlpha=1;
  // Body
  wctx.fillStyle=cfg.outfitColor;wctx.fillRect(cx-bw/2,cy-2,bw,bh+2);
  // Legs
  wctx.fillStyle=blendColor(cfg.outfitColor,-30);
  wctx.fillRect(cx-legW-1,cy+bh,legW,8);wctx.fillRect(cx+1,cy+bh,legW,8);
  // Shoes
  wctx.fillStyle=cfg.shoeColor;wctx.fillRect(cx-legW-2,cy+bh+6,legW+2,3);wctx.fillRect(cx,cy+bh+6,legW+2,3);
  // Arms
  wctx.fillStyle=cfg.skinTone;const armW=isFemale?3:4;
  wctx.fillRect(cx-bw/2-armW-1,cy-1,armW,10);wctx.fillRect(cx+bw/2+1,cy-1,armW,10);
  // Neck
  wctx.fillStyle=cfg.skinTone;wctx.fillRect(cx-2,cy-5,4,4);
  // Head
  wctx.fillStyle=cfg.skinTone;wctx.fillRect(cx-hw/2,cy-hh-5,hw,hh);
  // Eyes glow
  const eg=(Math.sin(Date.now()*.003)+1)*.5;
  wctx.globalAlpha=.5+eg*.5;wctx.fillStyle=cfg.eyeColor;
  wctx.fillRect(cx-3,cy-hh-5+3,2,2);wctx.fillRect(cx+1,cy-hh-5+3,2,2);
  wctx.globalAlpha=1;
  // Hair
  drawWardHair(wctx,cx,cy-hh-5,hw,hh,cfg.hairStyle,cfg.hairColor,isFemale);
  // Face extras
  if(cfg.faceStyle===3){wctx.fillStyle=cfg.hairColor;wctx.fillRect(cx-4,cy-hh-5+7,8,2);}
  if(cfg.faceStyle===5){wctx.strokeStyle='#888';wctx.lineWidth=1;wctx.strokeRect(cx-4,cy-hh-5+2,4,4);wctx.strokeRect(cx+1,cy-hh-5+2,4,4);}
  // Aura
  wctx.globalAlpha=.04+eg*.04;wctx.fillStyle=cfg.eyeColor;
  wctx.beginPath();wctx.ellipse(cx,cy,8,14,0,0,Math.PI*2);wctx.fill();wctx.globalAlpha=1;
  // Weapon in hand
  const weap=inventory.equipped.weapon;
  if(weap&&ITEM_DB[weap]){
    wctx.font='14px serif';wctx.textAlign='left';wctx.textBaseline='middle';
    wctx.fillText(ITEM_DB[weap].icon,cx+bw/2+armW+1,cy+2);
  }
}
function drawWardHair(wctx,x,topY,hw,hh,style,color,isFemale){
  wctx.fillStyle=color;
  const s=[
    ()=>{wctx.fillRect(x-hw/2,topY,hw,4);wctx.fillRect(x-hw/2-1,topY+2,2,4);wctx.fillRect(x+hw/2-1,topY+2,2,4);},
    ()=>{wctx.fillRect(x-hw/2,topY,hw,3);wctx.fillRect(x-hw/2-2,topY+2,3,18);wctx.fillRect(x+hw/2-1,topY+2,3,18);},
    ()=>{for(let i=0;i<4;i++)wctx.fillRect(x-hw/2+i*(hw/4),topY-3+i%2*2,2,6);wctx.fillRect(x-hw/2,topY,hw,3);},
    ()=>{wctx.fillRect(x-hw/2,topY,hw,3);for(let i=0;i<3;i++){wctx.fillRect(x-hw/2-2+i*2,topY+2,3,3);wctx.fillRect(x-hw/2-1+i*3,topY+4,2,3);}},

const TILE_COLORS={[T.GRASS]:['#4a7c3a','#3d6a2e','#558040'],[T.DIRT]:['#8b6340','#7a5535','#9a7048'],[T.STONE]:['#787878','#686868','#888'],[T.WATER]:['#2266aa','#1a559a','#3377bb'],[T.SAND]:['#c8a850','#b89840','#d8b860'],[T.PATH]:['#c8b888','#b8a878','#d8c898'],[T.FLOWER]:['#4a7c3a','#3d6a2e','#558040'],[T.TREE]:['#2a5a1a','#1a4a0a','#3a6a2a'],[T.TALL_GRASS]:['#3a6a2a','#2a5a1a','#4a7a3a']};
function tileIsWalkable(tx,ty){if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return false;const t=villageMap[Math.floor(ty)][Math.floor(tx)];if(t===T.WATER||t===T.TREE)return false;for(const b of BUILDINGS){if(tx>=b.x&&tx<b.x+b.w&&ty>=b.y&&ty<b.y+b.h){if(Math.floor(tx)===b.doorTileX&&Math.floor(ty)===b.doorTileY)return true;return false;}}return true;}
function getBuildingAtDoor(tx,ty){for(const b of BUILDINGS){if(Math.floor(tx)===b.doorTileX&&Math.floor(ty)===b.doorTileY)return b;}return null;}
function getNPCNear(px,py,r=1.2){for(const n of NPCS){const dx=n.x-px,dy=n.y-py;if(Math.sqrt(dx*dx+dy*dy)<r)return n;}return null;}

function handleVillageInput(dt){
  if(dialogBox||overlayOpen)return;
  let dx=0,dy=0;
  const spd=(keys['Shift']||vPlayer.isRunning)?vPlayer.runSpeed:vPlayer.speed;
  if(keys['ArrowUp']||keys['w']||keys['W'])dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S'])dy=1;
  if(keys['ArrowLeft']||keys['a']||keys['A'])dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx=1;
  if(dx&&dy){dx*=0.7071;dy*=0.7071;}
  const tvx=dx*spd,tvy=dy*spd,ac=18;
  vPlayer.vx=lerp(vPlayer.vx,tvx,1-Math.exp(-ac*dt));vPlayer.vy=lerp(vPlayer.vy,tvy,1-Math.exp(-ac*dt));
  if(Math.abs(vPlayer.vx)<0.5&&dx===0)vPlayer.vx=0;if(Math.abs(vPlayer.vy)<0.5&&dy===0)vPlayer.vy=0;
  const moving=Math.abs(vPlayer.vx)>1||Math.abs(vPlayer.vy)>1;vPlayer.moving=moving;
  if(moving){const ax=Math.abs(vPlayer.vx),ay=Math.abs(vPlayer.vy);if(ax>ay)vPlayer.facing=vPlayer.vx>0?1:3;else vPlayer.facing=vPlayer.vy>0?2:0;}
  const sx=vPlayer.vx*dt,sy=vPlayer.vy*dt,nx=(vPlayer.px+sx)/TILE,ny=(vPlayer.py+sy)/TILE,cx2=vPlayer.px/TILE,cy2=vPlayer.py/TILE;
  if(tileIsWalkable(nx,cy2))vPlayer.px+=sx;else vPlayer.vx=0;
  if(tileIsWalkable(cx2,ny))vPlayer.py+=sy;else vPlayer.vy=0;
  if(moving){const d=Math.sqrt(vPlayer.vx*vPlayer.vx+vPlayer.vy*vPlayer.vy)*dt;vPlayer.stepAnim+=d*0.22;vPlayer.stepSfxAccum+=d;if(vPlayer.stepSfxAccum>26){sfxStep();vPlayer.stepSfxAccum=0;}}
  else{vPlayer.stepAnim=lerp(vPlayer.stepAnim,Math.round(vPlayer.stepAnim/Math.PI)*Math.PI,1-Math.exp(-12*dt));}
  if(keys['e']||keys['E']||keys['Enter']){keys['e']=keys['E']=keys['Enter']=false;const n=getNPCNear(tileX(),tileY());if(n){dialogBox={name:n.name,lines:n.dialog,lineIdx:0,timer:0};return;}const db=getBuildingAtDoor(Math.round(tileX()),Math.round(tileY()));if(db)enterBuilding(db);}
  if(keys[' ']||keys['z']){keys[' ']=keys['z']=false;doAttack();}
  const nb=getBuildingAtDoor(Math.round(tileX()),Math.round(tileY()));if(nb)enterPrompt=nb;else enterPrompt=null;
}

function doAttack(){if(vPlayer.isAttacking)return;vPlayer.isAttacking=true;vPlayer.attackAnim=0;sfxAttack();for(let i=0;i<8;i++)spawnP(vPlayer.px+(Math.random()-.5)*20,vPlayer.py-16,(Math.random()-.5)*3,-2-Math.random()*2,18,'#ffcc44',2);notification={text:'⚔ SERANG!',timer:40};}

function handleIndoorInput(dt){
  if(dialogBox||overlayOpen)return;
  const def=INDOOR_DEFS[currentBuilding?.interior]||INDOOR_DEFS.home;
  const spd=(keys['Shift']||vPlayer.isRunning)?vPlayer.runSpeed*0.7:vPlayer.speed*0.7;
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['w']||keys['W'])dy=-1;if(keys['ArrowDown']||keys['s']||keys['S'])dy=1;
  if(keys['ArrowLeft']||keys['a']||keys['A'])dx=-1;if(keys['ArrowRight']||keys['d']||keys['D'])dx=1;
  if(dx&&dy){dx*=0.7071;dy*=0.7071;}
  const tvx=dx*spd,tvy=dy*spd,ac=16;
  vPlayer.indoorVx=lerp(vPlayer.indoorVx,tvx,1-Math.exp(-ac*dt));vPlayer.indoorVy=lerp(vPlayer.indoorVy,tvy,1-Math.exp(-ac*dt));
  if(Math.abs(vPlayer.indoorVx)<0.5&&dx===0)vPlayer.indoorVx=0;if(Math.abs(vPlayer.indoorVy)<0.5&&dy===0)vPlayer.indoorVy=0;
  const moving=Math.abs(vPlayer.indoorVx)>1||Math.abs(vPlayer.indoorVy)>1;vPlayer.moving=moving;
  if(moving){const ax=Math.abs(vPlayer.indoorVx),ay=Math.abs(vPlayer.indoorVy);if(ax>ay)vPlayer.facing=vPlayer.indoorVx>0?1:3;else vPlayer.facing=vPlayer.indoorVy>0?2:0;vPlayer.stepAnim+=Math.sqrt(vPlayer.indoorVx**2+vPlayer.indoorVy**2)*dt*0.22;vPlayer.stepSfxAccum+=Math.sqrt(vPlayer.indoorVx**2+vPlayer.indoorVy**2)*dt;if(vPlayer.stepSfxAccum>22){sfxStep();vPlayer.stepSfxAccum=0;}}
  else{vPlayer.stepAnim=lerp(vPlayer.stepAnim,Math.round(vPlayer.stepAnim/Math.PI)*Math.PI,1-Math.exp(-12*dt));}
  const nx2=clamp(vPlayer.indoorPx+vPlayer.indoorVx*dt,38,442),ny2=clamp(vPlayer.indoorPy+vPlayer.indoorVy*dt,38,275);
  let blocked=false;
  for(const item of def.items){if(!item.noBlock&&item.w>20&&item.h>20){const m=10;if(nx2>item.x-m&&nx2<item.x+item.w+m&&ny2>item.y-m&&ny2<item.y+item.h+m){blocked=true;break;}}}
  if(!blocked){vPlayer.indoorPx=nx2;vPlayer.indoorPy=ny2;}else{vPlayer.indoorVx=0;vPlayer.indoorVy=0;}
  // Exit via door
  if(vPlayer.indoorPy>262&&vPlayer.indoorPx>200&&vPlayer.indoorPx<280){exitBuilding();return;}
  if(keys['e']||keys['E']||keys['Enter']){keys['e']=keys['E']=keys['Enter']=false;exitBuilding();}
}

function updateVillage(dt){
  villageTimer++;villageAlpha=clamp(villageTimer/80,0,1);
  handleVillageInput(dt);
  const tcx=vPlayer.px-240+TILE/2,tcy=vPlayer.py-160+TILE/2;
  cam.x=lerp(cam.x,tcx,1-Math.exp(-8*dt));cam.y=lerp(cam.y,tcy,1-Math.exp(-8*dt));
  cam.x=clamp(cam.x,0,MAP_W*TILE-480);cam.y=clamp(cam.y,0,MAP_H*TILE-320);
  if(notification){notification.timer-=(dt*60);if(notification.timer<=0)notification=null;}
  if(dialogBox)dialogBox.timer+=(dt*60);
  for(let n of NPCS)n.bobOffset+=0.04*(dt*60);
}

function drawBorderW(c,x,y,w,h,color,thick){c.strokeStyle=color;c.lineWidth=thick;c.strokeRect(Math.floor(x)+.5,Math.floor(y)+.5,Math.floor(w),Math.floor(h));}

function renderVillage(){
  ctx.save();ctx.globalAlpha=villageAlpha;
  const sg=ctx.createLinearGradient(0,0,0,320);sg.addColorStop(0,'#1a3050');sg.addColorStop(.5,'#2a5080');sg.addColorStop(1,'#4a7a30');
  ctx.fillStyle=sg;ctx.fillRect(0,0,480,320);
  ctx.save();ctx.translate(-cam.x,-cam.y);
  const stx=Math.floor(cam.x/TILE),sty=Math.floor(cam.y/TILE),etx=Math.min(MAP_W,stx+Math.ceil(480/TILE)+2),ety=Math.min(MAP_H,sty+Math.ceil(320/TILE)+2);
  for(let ty=sty;ty<ety;ty++)for(let tx=stx;tx<etx;tx++){if(ty<0||ty>=MAP_H||tx<0||tx>=MAP_W)continue;const tType=villageMap[ty][tx];const px2=tx*TILE,py2=ty*TILE;const colors=TILE_COLORS[tType]||['#444','#333','#555'];ctx.fillStyle=colors[(tx+ty)%2];ctx.fillRect(px2,py2,TILE,TILE);if(tType===T.GRASS&&(tx*7+ty*3)%5===0){ctx.fillStyle='#5a8a3a';ctx.fillRect(px2+4,py2+6,2,4);ctx.fillRect(px2+10,py2+4,2,6);}else if(tType===T.FLOWER){ctx.fillStyle=['#ffdd44','#ff6688','#88ddff'][(tx*3+ty*7)%3];ctx.fillRect(px2+8,py2+8,4,4);}else if(tType===T.WATER){const wa=Math.sin(villageTimer*0.04+tx*0.5+ty*0.3);ctx.globalAlpha=0.4+wa*0.1;ctx.fillStyle='#66aaee';ctx.fillRect(px2+4,py2+8,8,2);ctx.fillRect(px2+18,py2+18,10,2);ctx.globalAlpha=villageAlpha;}else if(tType===T.PATH){ctx.fillStyle='#b8a878';ctx.fillRect(px2+1,py2+1,TILE-2,TILE-2);}else if(tType===T.TALL_GRASS){for(let i=0;i<4;i++){ctx.fillStyle=['#3a7a2a','#4a8a3a','#2a6a1a','#5a9a4a'][i];ctx.fillRect(px2+i*8,py2+4,3,TILE-4);}}else if(tType===T.TREE){ctx.fillStyle='#5a3a1a';ctx.fillRect(px2+12,py2+18,8,14);ctx.fillStyle='#2a6a10';ctx.fillRect(px2+4,py2+4,24,18);ctx.fillStyle='#3a8a20';ctx.fillRect(px2+8,py2,16,8);}}
  ctx.globalAlpha=villageAlpha;
  for(const b of BUILDINGS)drawBuilding(b);
  for(const n of NPCS)drawNPC(n);

  ctx.restore();

  ctx.restore();
}

function drawBuilding(b){
  const px2=b.x*TILE,py2=b.y*TILE,bw=b.w*TILE,bh=b.h*TILE;
  const doorPX=b.doorTileX*TILE,doorPY=b.doorTileY*TILE;

  ctx.fillStyle=b.color;ctx.fillRect(px2,py2,bw,bh);
  ctx.globalAlpha=0.2;ctx.fillStyle='#000';for(let ry=0;ry<bh;ry+=8){ctx.fillRect(px2,py2+ry,bw,1);const off=(Math.floor(ry/8)%2)*8;for(let rx=off;rx<bw;rx+=16)ctx.fillRect(px2+rx,py2+ry,1,8);}
  ctx.globalAlpha=villageAlpha;ctx.fillStyle=blendColor(b.color,40);ctx.fillRect(px2,py2,bw,3);

  if(b.type==='temple'){ctx.fillStyle='#ddcc88';ctx.fillRect(px2+bw/2-3,py2-22,6,14);const gT=(Math.sin(villageTimer*0.04)+1)/2;ctx.globalAlpha=0.2+gT*0.2;ctx.fillStyle='#ffdd88';ctx.beginPath();ctx.arc(px2+bw/2,py2-22,12,0,Math.PI*2);ctx.fill();ctx.globalAlpha=villageAlpha;}

}
function drawNPC(npc){

function drawCharacterOn(c,px,footY,stepAnim,moving,isAttacking,attackAnim,alpha){

  const bw=isFemale?9:10,bh=isFemale?11:10,hw=isFemale?8:9,hh=isFemale?9:8;
  const wc=stepAnim,bob=moving?Math.sin(wc*2)*1.8:0;
  const ls=Math.sin(wc)*(moving?3.5:0),as=Math.sin(wc)*(moving?2.5:0);
  c.globalAlpha=0.38*alpha;c.fillStyle='#000';c.beginPath();c.ellipse(px,footY+2,9,3,0,0,Math.PI*2);c.fill();c.globalAlpha=alpha;
  const bX=px,bY=footY+bob,sX=cfg.shoeColor;
  c.fillStyle=sX;c.fillRect(Math.floor(bX-bw/2-1),Math.floor(bY-2+ls),5,2);c.fillRect(Math.floor(bX+1),Math.floor(bY-2-ls),5,2);
  c.fillStyle=blendColor(cfg.outfitColor,-35);c.fillRect(Math.floor(bX-bw/2+1),Math.floor(bY-7+ls),3,5);c.fillRect(Math.floor(bX+1),Math.floor(bY-7-ls),3,5);
  const bTop=bY-7-bh-2;c.fillStyle=cfg.outfitColor;c.fillRect(Math.floor(bX-bw/2),Math.floor(bTop),bw,bh+2);
  c.fillStyle=cfg.skinTone;c.fillRect(Math.floor(bX-bw/2-3),Math.floor(bTop+as),3,9);c.fillRect(Math.floor(bX+bw/2),Math.floor(bTop-as),3,9);
  if(isAttacking){const ap=attackAnim/14;c.globalAlpha=(1-ap)*0.85*alpha;c.fillStyle='#ffcc44';c.fillRect(Math.floor(bX+bw/2),Math.floor(bTop-5),14,4);c.globalAlpha=alpha;}
  const nTop=bTop-5;c.fillStyle=cfg.skinTone;c.fillRect(Math.floor(bX-2),Math.floor(nTop),4,5);
  const hTop=nTop-hh;c.fillStyle=cfg.skinTone;c.fillRect(Math.floor(bX-hw/2),Math.floor(hTop),hw,hh);
  const eg=(Math.sin(tick*0.07)+1)/2;c.globalAlpha=(0.5+eg*0.5)*alpha;c.fillStyle=cfg.eyeColor;c.fillRect(Math.floor(bX-3),Math.floor(hTop+3),2,2);c.fillRect(Math.floor(bX+1),Math.floor(hTop+3),2,2);c.globalAlpha=alpha;
  if(cfg.faceStyle===1){c.fillStyle='#aa3322';c.fillRect(Math.floor(bX+2),Math.floor(hTop+1),1,7);}else if(cfg.faceStyle===3){c.fillStyle=cfg.hairColor;c.fillRect(Math.floor(bX-5),Math.floor(hTop+7),10,2);}
  c.fillStyle=cfg.hairColor;c.fillRect(Math.floor(bX-hw/2),Math.floor(hTop),hw,3);
  if(cfg.hairStyle===1||cfg.hairStyle===7){c.fillRect(Math.floor(bX-hw/2-2),Math.floor(hTop+2),2,11);c.fillRect(Math.floor(bX+hw/2),Math.floor(hTop+2),2,11);}
  if(cfg.hairStyle===2||cfg.hairStyle===6){for(let si=0;si<3;si++)c.fillRect(Math.floor(bX-3+si*3),Math.floor(hTop-3+si%2*2),2,5);}
  c.globalAlpha=(0.04+eg*0.04)*alpha;c.fillStyle=cfg.eyeColor;c.beginPath();c.ellipse(bX,bTop+bh/2,12,18,0,0,Math.PI*2);c.fill();c.globalAlpha=1;
  // Weapon in hand
  const weap=inventory.equipped.weapon;
  if(weap&&ITEM_DB[weap]){c.globalAlpha=alpha;c.font='10px serif';c.textAlign='left';c.textBaseline='middle';c.fillText(ITEM_DB[weap].icon,Math.floor(bX+bw/2+3),Math.floor(bTop+2));}
  c.globalAlpha=1;
}

resizeIndoor();window.addEventListener('resize',resizeIndoor);

function enterBuilding(b){
  currentBuilding=b;scene=SCENES.INDOOR;indoorTimer=0;indoorAlpha=0;
  vPlayer.indoorPx=240;vPlayer.indoorPy=240;vPlayer.indoorVx=0;vPlayer.indoorVy=0;vPlayer.moving=false;
  indoorCanvas.style.display='block';
  notification={text:'Masuk ke '+b.name,timer:90};sfxDoor();stopVillageBGM();startIndoorBGM();
  const def=INDOOR_DEFS[b.interior];if(def?.interactMsg)setTimeout(()=>{notification={text:def.interactMsg,timer:120};},1200);
}
function exitBuilding(){
  indoorCanvas.style.display='none';scene=SCENES.VILLAGE;currentBuilding=null;
  vPlayer.indoorVx=0;vPlayer.indoorVy=0;vPlayer.moving=false;
  notification={text:'Keluar dari bangunan',timer:60};sfxDoor();stopIndoorBGM();startVillageBGM();
}

function renderIndoor(dt){
  indoorTimer++;indoorAlpha=clamp(indoorTimer/40,0,1);
  handleIndoorInput(dt);
  const b=currentBuilding;if(!b)return;
  const def=INDOOR_DEFS[b.interior]||INDOOR_DEFS.home;
  ictx.clearRect(0,0,480,320);ictx.globalAlpha=indoorAlpha;

  // Background + floor
  ictx.fillStyle=def.bg;ictx.fillRect(0,0,480,320);
  for(let fy=0;fy<320;fy+=24)for(let fx=0;fx<480;fx+=24){ictx.fillStyle=((Math.floor(fx/24)+Math.floor(fy/24))%2)?def.floor:def.floorAlt;ictx.fillRect(fx,fy,24,24);}
  ictx.globalAlpha=0.08*indoorAlpha;ictx.strokeStyle='#fff';ictx.lineWidth=1;for(let fy=0;fy<320;fy+=24)ictx.strokeRect(0,fy,480,24);
  ictx.globalAlpha=indoorAlpha;

  // Walls
  ictx.fillStyle=blendColor(def.bg,20);ictx.fillRect(0,0,480,30);ictx.fillStyle=blendColor(def.bg,-10);ictx.fillRect(0,28,480,4);
  ictx.fillStyle=blendColor(def.bg,10);ictx.fillRect(0,0,30,320);ictx.fillRect(450,0,30,320);

  // Items
  for(const item of def.items){
    const ao=item.anim?Math.sin(indoorTimer*0.1)*3:0;
    ictx.globalAlpha=(item.alpha||1)*indoorAlpha;ictx.fillStyle=item.color;ictx.fillRect(item.x,item.y+ao,item.w,item.h);
    if(item.label){ictx.font='5px "Press Start 2P"';ictx.fillStyle='#88ffcc';ictx.textAlign='center';ictx.textBaseline='top';ictx.fillText(item.label,item.x+item.w/2,item.y-8);}
    ictx.globalAlpha=indoorAlpha;
  }

  // Door (bottom center, glowing)
  const dX=220,dY=260;
  ictx.fillStyle=blendColor(def.bg,-30);ictx.fillRect(dX,dY,40,60);
  ictx.fillStyle=blendColor(def.bg,-50);ictx.fillRect(dX,dY,40,5);
  ictx.fillStyle='#ddaa44';ictx.fillRect(dX+28,dY+28,5,5);
  const dg=0.2+0.15*Math.sin(indoorTimer*0.08);ictx.globalAlpha=dg*indoorAlpha;ictx.fillStyle='#88ffcc';ictx.fillRect(dX-3,dY-3,46,66);ictx.globalAlpha=indoorAlpha;
  ictx.font='5px "Press Start 2P"';ictx.fillStyle='#88ffcc';ictx.textAlign='center';ictx.textBaseline='bottom';ictx.fillText('[E] KELUAR',dX+20,dY-2);

  // Player
  drawCharacterOn(ictx,vPlayer.indoorPx,vPlayer.indoorPy+6,vPlayer.stepAnim,vPlayer.moving,vPlayer.isAttacking,vPlayer.attackAnim,indoorAlpha);
  if(vPlayer.isAttacking){vPlayer.attackAnim++;if(vPlayer.attackAnim>=14){vPlayer.isAttacking=false;vPlayer.attackAnim=0;}}

  // HUD
  ictx.globalAlpha=0.92*indoorAlpha;ictx.fillStyle='#040c08';ictx.fillRect(0,0,480,18);
  drawBorderW(ictx,0,0,480,18,'#335544',1);
  ictx.font='6px "Press Start 2P"';ictx.textAlign='center';ictx.textBaseline='middle';ictx.fillStyle='#88ffcc';ictx.fillText(b.name.toUpperCase(),240,9);
  ictx.textAlign='left';ictx.fillStyle='#55aa77';ictx.fillText(charConfig.name.toUpperCase(),8,9);
  ictx.textAlign='right';ictx.fillStyle='#446655';ictx.font='4px "Press Start 2P"';ictx.fillText('[E]KELUAR [I]INV [C]LEMARI [⚔]SERANG',474,9);
  const st=getEquippedStats();ictx.textAlign='right';ictx.fillStyle='#557755';ictx.font='4px "Press Start 2P"';ictx.fillText(`⚔${st.atk} 🛡${st.def} 💨${st.spd} 💰${inventory.gold}`,474,26);
  // HP
  ictx.globalAlpha=0.85*indoorAlpha;ictx.fillStyle='#0a1208';ictx.fillRect(5,22,84,8);ictx.fillStyle='#1a2a1a';ictx.fillRect(6,23,82,6);
  const hr=vPlayer.hp/vPlayer.maxHp;ictx.fillStyle=hr>0.5?'#44cc44':hr>0.25?'#ccaa22':'#cc3322';ictx.fillRect(6,23,Math.floor(82*hr),6);ictx.globalAlpha=indoorAlpha;
  ictx.font='4px "Press Start 2P"';ictx.textAlign='left';ictx.fillStyle='#88cc88';ictx.fillText('HP '+vPlayer.hp,8,33);
  // Notification
  if(notification&&notification.timer>0){const al=Math.min(1,notification.timer/30);ictx.globalAlpha=al*indoorAlpha;ictx.fillStyle='#040c08';ictx.fillRect(40,12,400,20);drawBorderW(ictx,40,12,400,20,'#55aa77',1);ictx.font='6px "Press Start 2P"';ictx.fillStyle='#88ffcc';ictx.textAlign='center';ictx.textBaseline='middle';ictx.fillText(notification.text,240,22);ictx.globalAlpha=indoorAlpha;}
  // Vignette
  ictx.globalAlpha=0.35*indoorAlpha;const vg=ictx.createRadialGradient(240,160,60,240,160,250);vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.8)');ictx.fillStyle=vg;ictx.fillRect(0,0,480,320);ictx.globalAlpha=1;
}

// ===================== MOBILE CONTROLS =====================
function createMobileControls(){
  const mc=document.createElement('div');mc.id='mc';
  mc.innerHTML=`<style>
    #mc{position:fixed;bottom:0;left:0;right:0;height:155px;z-index:300;pointer-events:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 12px 14px;}
    #dpW{position:relative;width:130px;height:130px;pointer-events:all;flex-shrink:0;}
    .db{position:absolute;width:40px;height:40px;background:rgba(20,50,35,.82);border:1.5px solid #336644;color:#88ffcc;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:none;border-radius:6px;}
    .db:active,.db.on{background:rgba(50,120,80,.95);border-color:#88ffcc;}
    #dUp{top:0;left:45px;}#dLeft{top:45px;left:0;}#dCenter{top:45px;left:45px;background:rgba(10,25,18,.7);border-color:#224433;color:#446655;font-size:10px;}#dRight{top:45px;left:90px;}#dDown{top:90px;left:45px;}
    #acW{position:relative;width:180px;height:130px;pointer-events:all;flex-shrink:0;}
    .ab{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:none;flex-direction:column;gap:1px;}
    .ab:active,.ab.on{filter:brightness(1.4);transform:scale(.92);}
    .abl{font-size:4px;font-family:'Press Start 2P',monospace;opacity:.85;}
    #bAtk{width:50px;height:50px;background:rgba(120,30,20,.88);border:2px solid #cc4433;color:#ff8877;font-size:20px;bottom:0;right:0;}
    #bAct{width:44px;height:44px;background:rgba(20,80,50,.88);border:2px solid #44aa77;color:#88ffcc;font-size:16px;top:0;right:14px;}
    #bInv{width:40px;height:40px;background:rgba(40,20,80,.88);border:2px solid #8844cc;color:#cc88ff;font-size:14px;top:0;left:0;}
    #bWrd{width:40px;height:40px;background:rgba(80,40,20,.88);border:2px solid #cc8844;color:#ffcc88;font-size:14px;bottom:0;left:0;}
    #bRun{width:36px;height:36px;background:rgba(20,40,90,.88);border:1.5px solid #4466cc;color:#88aaff;font-size:13px;top:4px;right:62px;}
  </style>
  <div id="dpW">
    <button class="db" id="dUp">▲</button><button class="db" id="dLeft">◀</button>
    <div class="db" id="dCenter">✦</div><button class="db" id="dRight">▶</button><button class="db" id="dDown">▼</button>
  </div>
  <div id="acW">
    <button class="ab" id="bInv"><span style="font-size:16px">📦</span><span class="abl" style="color:#cc88ff">INV</span></button>
    <button class="ab" id="bRun"><span style="font-size:13px">💨</span><span class="abl" style="color:#88aaff">RUN</span></button>
    <button class="ab" id="bWrd"><span style="font-size:14px">👕</span><span class="abl" style="color:#ffcc88">LEMARI</span></button>
    <button class="ab" id="bAct"><span style="font-size:16px">💬</span><span class="abl" style="color:#88ffcc">AKSI</span></button>
    <button class="ab" id="bAtk"><span style="font-size:20px">⚔</span><span class="abl" style="color:#ff8877">SERANG</span></button>
  </div>`;
  document.body.appendChild(mc);

  let curDir=null;
  function doMove(dir){keys['ArrowUp']=dir==='up';keys['ArrowDown']=dir==='down';keys['ArrowLeft']=dir==='left';keys['ArrowRight']=dir==='right';}
  function startMove(dir){curDir=dir;document.getElementById(`d${dir[0].toUpperCase()+dir.slice(1)}`)?.classList.add('on');doMove(dir);}
  function stopMove(dir){curDir=null;document.getElementById(`d${dir[0].toUpperCase()+dir.slice(1)}`)?.classList.remove('on');keys['ArrowUp']=keys['ArrowDown']=keys['ArrowLeft']=keys['ArrowRight']=false;}
  ['up','down','left','right'].forEach(dir=>{const btn=document.getElementById(`d${dir[0].toUpperCase()+dir.slice(1)}`);if(!btn)return;btn.addEventListener('touchstart',e=>{e.preventDefault();startMove(dir);},{passive:false});btn.addEventListener('touchend',e=>{e.preventDefault();stopMove(dir);},{passive:false});btn.addEventListener('touchcancel',e=>{e.preventDefault();stopMove(dir);},{passive:false});btn.addEventListener('mousedown',()=>startMove(dir));btn.addEventListener('mouseup',()=>stopMove(dir));btn.addEventListener('mouseleave',()=>{if(curDir===dir)stopMove(dir);});});

  function doAction(){
    initAudio();
    if(overlayOpen)return;
    if(dialogBox){advanceDialog();return;}
    if(scene===SCENES.INDOOR){exitBuilding();return;}
    if(scene!==SCENES.VILLAGE)return;
    const n=getNPCNear(tileX(),tileY());if(n){dialogBox={name:n.name,lines:n.dialog,lineIdx:0,timer:0};return;}
    const db=getBuildingAtDoor(Math.round(tileX()),Math.round(tileY()));if(db){enterBuilding(db);return;}
    notification={text:'Tidak ada aksi di sini.',timer:60};
  }
  function doAtk(){
    initAudio();if(overlayOpen)return;
    if(scene===SCENES.INDOOR){keys[' ']=true;setTimeout(()=>{keys[' ']=false;},50);return;}
    doAttack();
  }
  const bAct=document.getElementById('bAct'),bAtk=document.getElementById('bAtk');
  bAct.addEventListener('touchstart',e=>{e.preventDefault();bAct.classList.add('on');doAction();},{passive:false});bAct.addEventListener('touchend',e=>{e.preventDefault();bAct.classList.remove('on');},{passive:false});bAct.addEventListener('click',()=>{initAudio();doAction();});
  bAtk.addEventListener('touchstart',e=>{e.preventDefault();doAtk();},{passive:false});bAtk.addEventListener('click',doAtk);

  const bInv=document.getElementById('bInv');bInv.addEventListener('touchstart',e=>{e.preventDefault();initAudio();if(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)openOverlay('inventory');},{passive:false});bInv.addEventListener('click',()=>{initAudio();if(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)openOverlay('inventory');});

  const bWrd=document.getElementById('bWrd');bWrd.addEventListener('touchstart',e=>{e.preventDefault();initAudio();if(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)openOverlay('wardrobe');},{passive:false});bWrd.addEventListener('click',()=>{initAudio();if(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)openOverlay('wardrobe');});

  const bRun=document.getElementById('bRun');let runOn=false;bRun.addEventListener('touchstart',e=>{e.preventDefault();runOn=!runOn;vPlayer.isRunning=runOn;bRun.style.background=runOn?'rgba(40,60,160,.95)':'rgba(20,40,90,.88)';bRun.classList.toggle('on',runOn);},{passive:false});bRun.addEventListener('click',()=>{runOn=!runOn;vPlayer.isRunning=runOn;bRun.style.background=runOn?'rgba(40,60,160,.95)':'rgba(20,40,90,.88)';bRun.classList.toggle('on',runOn);});

  setInterval(()=>{const sh=(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)&&!overlayOpen;mc.style.display=sh?'flex':'none';},200);
  mc.style.display='none';
}

// ===================== MAIN LOOP =====================
function gameLoop(ts){
  if(!lastTime)lastTime=ts;deltaTime=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  ctx.clearRect(0,0,480,320);tick++;
  switch(scene){
    case SCENES.DEATH:updateDeath();renderDeath();break;
    case SCENES.VOID:updateVoid();renderVoid();break;
    case SCENES.REBORN:updateReborn();renderReborn();break;
    case SCENES.VILLAGE:updateVillage(deltaTime);renderVillage();updateP(deltaTime);break;
    case SCENES.INDOOR:renderVillage();renderIndoor(deltaTime);updateP(deltaTime);break;
  }
  requestAnimationFrame(gameLoop);
}

initDeath();createMobileControls();cam.x=0;cam.y=0;requestAnimationFrame(gameLoop);
</script>
