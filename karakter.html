<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
body{font-family:'Press Start 2P',monospace;cursor:none;}
#gameContainer{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

#vignette{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.6) 100%);pointer-events:none;z-index:201;}

/* WEAPON ARSENAL STYLES */
.weap-rarity-stripe{height:2px;width:100%;display:block;}
#weapGrid::-webkit-scrollbar{display:none;}
#weapDetail::-webkit-scrollbar{display:none;}

#customScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.97);z-index:500;display:none;flex-direction:column;align-items:center;overflow:hidden;font-family:'Press Start 2P',monospace;}
#customScreen.active{display:flex;}

.cs-title{font-size:9px;color:#88ffcc;letter-spacing:2px;text-shadow:0 0 10px #88ffcc66;}
.cs-step-badge{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:7px;color:#445544;}

#wardCanvas{image-rendering:pixelated;}
.ward-slots{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:100%;}

.ward-item-row.equipped{border-color:#ffcc44;background:#0a0a00;}
.ward-item-icon{font-size:18px;flex-shrink:0;}
.ward-item-info{flex:1;}
.ward-item-name{font-size:6px;color:#88ffcc;margin-bottom:3px;}
.ward-item-stat{font-size:5px;color:#557755;}
.ward-item-eq{font-size:5px;color:#ffcc44;}
</style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC01ssDQCYgDiv28h_aPFqo5-rkylMUqZg",
      authDomain: "mmogame-e4035.firebaseapp.com",
      databaseURL: "https://mmogame-e4035-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mmogame-e4035",
      storageBucket: "mmogame-e4035.firebasestorage.app",
      messagingSenderId: "967874774427",
      appId: "1:967874774427:web:6266749e28f8cfdff70d3e",
      measurementId: "G-MKM50NDL2B"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // Generate/load a stable session ID for this player
    let sessionId = localStorage.getItem('reborn_session_id');
    if (!sessionId) {
      sessionId = 'player_' + Date.now() + '_' + Math.floor(Math.random()*9999);
      localStorage.setItem('reborn_session_id', sessionId);
    }
    window.FIREBASE_SESSION_ID = sessionId;
    window.FIREBASE_DB = db;
    window.FIREBASE_REF = ref;
    window.FIREBASE_SET = set;
    window.FIREBASE_ON_VALUE = onValue;
    window.FIREBASE_SERVER_TS = serverTimestamp;

    // Save character data to Firebase
    window.saveCharacterToFirebase = function(charData) {
      const playerRef = ref(db, 'players/' + sessionId + '/character');
      set(playerRef, {
        ...charData,
        lastSeen: Date.now()
      });
    };

    // Save inventory/position to Firebase
    window.saveGameStateToFirebase = function(state) {
      const stateRef = ref(db, 'players/' + sessionId + '/state');
      set(stateRef, {
        ...state,
        lastSeen: Date.now()
      });
    };

    // Load saved character if exists
    window.loadFromFirebase = function(callback) {
      const playerRef = ref(db, 'players/' + sessionId);
      onValue(playerRef, (snapshot) => {
        const data = snapshot.val();
        if (data) callback(data);
      }, { onlyOnce: true });
    };

    // Broadcast player online presence to village
    window.broadcastPresence = function(px, py, charConfig) {
      const presRef = ref(db, 'village/players/' + sessionId);
      set(presRef, {
        x: Math.floor(px), y: Math.floor(py),
        name: charConfig.name,
        gender: charConfig.gender,
        skinTone: charConfig.skinTone,
        hairColor: charConfig.hairColor,
        outfitColor: charConfig.outfitColor,
        online: true,
        lastSeen: Date.now()
      });
    };

    // Listen for other players in the village
    window.listenOtherPlayers = function(callback) {
      const villageRef = ref(db, 'village/players');
      onValue(villageRef, (snapshot) => {
        const all = snapshot.val() || {};
        const others = {};
        const now = Date.now();
        for (const [id, data] of Object.entries(all)) {
          if (id !== sessionId && data.lastSeen && (now - data.lastSeen) < 30000) {
            others[id] = data;
          }
        }
        callback(others);
      });
    };

    console.log('[Firebase] Connected. Session:', sessionId);

<script>
// ===================== CORE =====================
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
let lastTime=0,deltaTime=0;
function resize(){const s=Math.min(window.innerWidth/480,window.innerHeight/320);canvas.width=480;canvas.height=320;canvas.style.width=Math.floor(480*s)+'px';canvas.style.height=Math.floor(320*s)+'px';}
resize();window.addEventListener('resize',resize);
const cursorEl=document.getElementById('cursor');
window.addEventListener('mousemove',e=>{cursorEl.style.left=e.clientX+'px';cursorEl.style.top=e.clientY+'px';});

// ===================== AUDIO =====================
let audioCtx=null,isMuted=false,bgmInterval=null,indoorBgmInterval=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
let _masterNode=null;
function getMaster(){if(!audioCtx)return null;if(!_masterNode){_masterNode=audioCtx.createGain();_masterNode.gain.value=isMuted?0:0.18;_masterNode.connect(audioCtx.destination);}return _masterNode;}
function playNote(freq,type='sine',dur=0.3,vol=0.12,delay=0){
  if(!audioCtx||isMuted)return;const m=getMaster();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;const t=audioCtx.currentTime+delay;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(m);o.start(t);o.stop(t+dur+0.05);
}
const VS=[261.63,293.66,329.63,392,440,523.25,587.33,659.25];
const VB=[65.41,73.42,82.41,98];
const VM=[0,2,4,5,4,2,4,7,5,4,2,0,2,4,2,0,0,4,5,7,5,4,7,5,2,4,5,2,0,2,4,0];
const VBP=[0,0,2,2,1,1,3,3,0,0,2,2,1,1,3,3,0,0,1,1,2,2,3,3,0,0,2,2,1,1,0,0];
let bgmBeat=0;
function startVillageBGM(){if(bgmInterval)return;initAudio();if(!audioCtx)return;bgmBeat=0;const beat=60/88;bgmInterval=setInterval(()=>{if(!audioCtx||isMuted)return;const b=bgmBeat%32;playNote(VS[VM[b]]*2,'triangle',beat*0.7,0.10);if(b%2===0){playNote(VB[VBP[b]],'triangle',beat*1.8,0.13);if(b%8===0){[[130.81,164.81,196],[146.83,185,220],[164.81,196,246.94],[123.47,155.56,185]][Math.floor(b/8)%4].forEach(f=>playNote(f,'sine',beat*7.5,0.035));}}bgmBeat++;},beat*1000);}
function stopVillageBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}}
let indoorBeat=0;
const IS=[261.63,277.18,311.13,349.23,392,415.3,466.16,523.25];
const IM=[0,2,4,6,4,2,0,1,2,4,6,7,6,4,2,0];
function startIndoorBGM(){if(indoorBgmInterval)return;initAudio();if(!audioCtx)return;indoorBeat=0;const beat=60/60;indoorBgmInterval=setInterval(()=>{if(!audioCtx||isMuted)return;const b=indoorBeat%16;const f=IS[IM[b]];playNote(f,'sine',beat*1.8,0.07);if(b%4===0)playNote(f*0.5,'triangle',beat*3.5,0.055);if(b%8===0)[f*0.75,f,f*1.25].forEach(ff=>playNote(ff,'sine',beat*7,0.022));indoorBeat++;},beat*1000);}
function stopIndoorBGM(){if(indoorBgmInterval){clearInterval(indoorBgmInterval);indoorBgmInterval=null;}}
function sfxDoor(){if(!audioCtx||isMuted)return;[400,300,200].forEach((f,i)=>playNote(f,'triangle',0.15,0.08,i*0.08));}
function sfxSelect(){if(!audioCtx||isMuted)return;playNote(660,'triangle',0.06,0.06);}
function sfxEquip(){if(!audioCtx||isMuted)return;[440,550,660].forEach((f,i)=>playNote(f,'square',0.08,0.07,i*0.05));}
function sfxStep(){if(!audioCtx||isMuted)return;playNote(120+Math.random()*60,'sine',0.04,0.03);}
function sfxAttack(){if(!audioCtx||isMuted)return;playNote(180,'sawtooth',0.12,0.15);playNote(220,'square',0.08,0.08,0.05);}
function toggleMute(){isMuted=!isMuted;if(_masterNode)_masterNode.gain.value=isMuted?0:0.18;}

// ===================== GAME STATE =====================
const SCENES={DEATH:'death',VOID:'void',REBORN:'reborn',VILLAGE:'village',INDOOR:'indoor'};
let scene=SCENES.DEATH,tick=0;
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key==='i'||e.key==='I')&&(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)){openOverlay('inventory');}
  if((e.key==='c'||e.key==='C')&&(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)){openOverlay('wardrobe');}
  if(e.key==='m'||e.key==='M'){toggleMute();}
  if(e.key==='Escape'&&overlayOpen){closeOverlay();}
  if((e.key==='h'||e.key==='H')&&(scene===SCENES.VILLAGE||scene===SCENES.INDOOR)){
    if(weaponHolster==='hand') weaponHolster='hip';
    else if(weaponHolster==='hip') weaponHolster='back';
    else weaponHolster='hand';
    notification={text:'⚔ SENJATA: '+(weaponHolster==='hand'?'DI TANGAN':weaponHolster==='hip'?'DI PINGGANG':'DI PUNGGUNG'),timer:60};
  }
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
// Global analog stick state (set by createMobileControls)
let analogDx=0, analogDy=0, analogActive=false;
// Weapon holster mode: 'hand'=held in hand (default), 'hip'=on hip/waist, 'back'=on back
let weaponHolster='hand';
function lerpColor(c1,c2,t){const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);return `rgb(${Math.floor(lerp(r1,r2,t))},${Math.floor(lerp(g1,g2,t))},${Math.floor(lerp(b1,b2,t))})`;}
function pixelText(t,x,y,size,color,align='left'){ctx.save();ctx.font=`${size}px "Press Start 2P"`;ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline='top';ctx.imageSmoothingEnabled=false;ctx.fillText(t,x,y);ctx.restore();}
function drawRect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(Math.floor(x),Math.floor(y),Math.floor(w),Math.floor(h));}
function noise(x,y,s){let n=Math.sin(x*127.1+y*311.7+s*17.3)*43758.5453;return n-Math.floor(n);}
function blendColor(hex,amt){let r,g,b;if(hex.startsWith('#')){r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16);}else{const m=hex.match(/\d+/g);if(!m)return hex;r=+m[0];g=+m[1];b=+m[2];}return `rgb(${clamp(r+amt,0,255)},${clamp(g+amt,0,255)},${clamp(b+amt,0,255)})`;}

// Particles
let particles=[];
function spawnP(x,y,vx,vy,life,color,size=2){particles.push({x,y,vx,vy,life,maxLife:life,color,size});}

// === PROJECTILE SYSTEM ===
let projectiles=[];
// Explosion effects list
let explosions=[];

function spawnProjectile(x,y,vx,vy,color,type='arrow'){
  const angle=Math.atan2(vy,vx);
  // Set lifetime based on type
  const life = type==='rocket'?160 : type==='bullet'?100 : type==='stone'?120 : 140;
  projectiles.push({x,y,vx,vy,color,type,angle,life,maxLife:life});
}

function spawnExplosion(x,y,color){
  explosions.push({x,y,color,life:40,maxLife:40,r:4});
}

function updateProjectiles(dt){
  projectiles=projectiles.filter(p=>p.life>0);
  for(const p of projectiles){
    p.x+=p.vx*(dt*60);
    p.y+=p.vy*(dt*60);
    p.life-=(dt*60);
    // Gravity for stone/sling projectiles
    if(p.type==='stone') p.vy+=0.04*(dt*60);
    // Trail particles per type
    if(p.type==='bullet'){if(Math.floor(p.life)%2===0)spawnP(p.x,p.y,0,0,4,p.color,1);}
    else if(p.type==='rocket'){if(Math.floor(p.life)%2===0){spawnP(p.x,p.y,(Math.random()-.5)*1.5,(Math.random()-.5)*1.5,10,'#ff6600',3);spawnP(p.x,p.y,0,0,6,'#ffcc00',2);}}
    else if(p.type==='stone'){if(Math.floor(p.life)%4===0)spawnP(p.x,p.y,0,0,5,'#aaaaaa',2);}
    else{if(Math.floor(p.life)%3===0)spawnP(p.x,p.y,0,0,6,p.color,2);}
  }
  // Update explosions
  explosions=explosions.filter(e=>e.life>0);
  for(const e of explosions){
    e.life-=(dt*60);
    e.r+=1.2*(dt*60);
    // Spawn fire+smoke particles
    if(Math.random()<0.6*(dt*60)){spawnP(e.x+(Math.random()-.5)*e.r,e.y+(Math.random()-.5)*e.r,(Math.random()-.5)*3,-1-Math.random()*3,18,Math.random()<0.5?'#ff4400':'#ffaa00',3);}
    if(Math.random()<0.4*(dt*60)){spawnP(e.x+(Math.random()-.5)*e.r*1.5,e.y+(Math.random()-.5)*e.r*1.5,(Math.random()-.5)*2,-0.5-Math.random()*2,22,'#555',3);}
  }
}

function drawProjectiles(c,offX=0,offY=0){
  // Draw explosions first (below projectiles)
  for(const e of explosions){
    const ex=Math.floor(e.x-offX), ey=Math.floor(e.y-offY);
    const alpha=e.life/e.maxLife;
    // Outer ring
    c.globalAlpha=alpha*0.5;
    c.fillStyle='#ff8800';
    c.beginPath();c.arc(ex,ey,e.r,0,Math.PI*2);c.fill();
    // Inner bright
    c.globalAlpha=alpha*0.8;
    c.fillStyle='#ffee00';
    c.beginPath();c.arc(ex,ey,e.r*0.55,0,Math.PI*2);c.fill();
    c.globalAlpha=alpha;
    c.fillStyle='#ffffff';
    c.beginPath();c.arc(ex,ey,e.r*0.2,0,Math.PI*2);c.fill();
    c.globalAlpha=1;
  }

  for(const p of projectiles){
    const x=Math.floor(p.x-offX), y=Math.floor(p.y-offY);
    const drawAngle=Math.atan2(p.vy,p.vx);
    c.save();
    c.translate(x,y);
    c.rotate(drawAngle);

    if(p.type==='arrow'){
      // Arrow — shaft (wood) + metal tip + colored fletching
      c.fillStyle='#8B4513';
      c.fillRect(-10,-1,18,2);
      c.fillStyle='#cccccc';
      c.fillRect(7,-2,6,4);
      c.fillRect(10,-3,3,6);
      c.fillStyle='#cc3322';
      c.fillRect(-12,-3,4,2);
      c.fillRect(-12,1,4,2);
      c.fillStyle='#eeeeee';
      c.fillRect(-12,-1,4,2);
    } else if(p.type==='bolt'){
      // Crossbow bolt — shorter, thicker, darker
      c.fillStyle='#5a3a1a';
      c.fillRect(-7,-1,14,2);
      // Metal tip
      c.fillStyle='#999';
      c.fillRect(6,-2,5,4);
      c.fillRect(8,-3,3,6);
      // Bolt flights (smaller, stiffer)
      c.fillStyle='#888';
      c.fillRect(-8,-3,3,2);
      c.fillRect(-8,1,3,2);
      c.fillStyle='#aaa';
      c.fillRect(-8,-1,3,2);
    } else if(p.type==='bullet'){
      // Bullet — brass casing + lead tip
      c.fillStyle='#c8a040';
      c.fillRect(-5,-2,9,4);
      // Lead nose
      c.fillStyle='#aaa';
      c.fillRect(3,-1,4,2);
      c.fillRect(4,-2,2,4);
      // Primer at base
      c.fillStyle='#885500';
      c.fillRect(-6,-1,2,2);
      // Glow tint
      c.globalAlpha=0.3;
      c.fillStyle=p.color;
      c.fillRect(-5,-2,11,4);
      c.globalAlpha=1;
    } else if(p.type==='stone'){
      // Sling stone — rough round rock
      c.fillStyle='#888';
      c.fillRect(-3,-3,6,6);
      c.fillStyle='#aaa';
      c.fillRect(-2,-3,3,2);
      c.fillStyle='#666';
      c.fillRect(1,1,2,2);
    } else if(p.type==='rocket'){
      // Rocket/RPG — elongated body with exhaust
      c.fillStyle='#555';
      c.fillRect(-14,-3,22,6);
      // Nose cone
      c.fillStyle='#cc4433';
      c.fillRect(7,-2,6,4);
      c.fillRect(9,-3,4,6);
      // Stabilizer fins
      c.fillStyle='#777';
      c.fillRect(-14,-5,5,4);
      c.fillRect(-14,1,5,4);
      // Exhaust glow
      c.globalAlpha=0.8;
      c.fillStyle='#ff6600';
      c.fillRect(-16,-2,4,4);
      c.globalAlpha=0.4;
      c.fillStyle='#ffcc00';
      c.fillRect(-18,-1,3,2);
      c.globalAlpha=1;
    }
    c.restore();
  }
}
function updateP(dt){
  const pc = (typeof ictx!=='undefined'&&scene===SCENES.INDOOR) ? ictx : ctx;
  particles=particles.filter(p=>p.life>0);
  for(let p of particles){
    p.x+=p.vx*(dt*60);p.y+=p.vy*(dt*60);p.vy+=0.02*(dt*60);p.vx*=Math.pow(0.98,dt*60);p.life-=(dt*60);
    pc.globalAlpha=Math.max(0,p.life/p.maxLife);
    pc.fillStyle=p.color;pc.fillRect(Math.floor(p.x),Math.floor(p.y),p.size,p.size);
    pc.globalAlpha=1;
  }
}

// Weapon animation state
const weapAnimState = {};
function getWeapAnim(id, animType) {
  if (!weapAnimState[id]) weapAnimState[id] = {t:Math.random()*100};
  weapAnimState[id].t += 0.04;
  const t = weapAnimState[id].t;
  switch(animType) {
    case 'bob':    return {tx:0, ty:Math.sin(t)*4, rot:0, sc:1};
    case 'float':  return {tx:Math.sin(t*0.7)*2, ty:Math.sin(t)*5, rot:Math.sin(t*0.5)*4, sc:1};
    case 'spin':   return {tx:0, ty:0, rot:t*30%360, sc:1};
    case 'shake':  return {tx:Math.sin(t*8)*2, ty:0, rot:0, sc:1};
    case 'pulse':  return {tx:0, ty:0, rot:0, sc:1+Math.sin(t*2)*0.08};
    case 'recoil': return {tx:Math.sin(t*3)*4, ty:0, rot:0, sc:1};
    default:       return {tx:0, ty:0, rot:0, sc:1};
  }
}

// Per-weapon attack animation configs
// Each returns {phase, progress (0-1), and weapon transform per frame}
const ATTACK_ANIMS = {
  // Melee slash: wide horizontal arc
  slash: {
    frames: 18, sfxVariant: 'slash',
    getTransform(f, facing) {
      const p = f / 18;
      const ease = p < 0.4 ? p/0.4 : 1-(p-0.4)/0.6;
      const swing = facing===1 ? -120*ease : 120*ease;
      return {rot: swing, tx: facing===1?8*ease:-8*ease, ty:-4*ease, sc:1+0.15*ease, reach:16*ease};
    }
  },
  // Stab: thrust forward
  stab: {
    frames: 14, sfxVariant: 'stab',
    getTransform(f, facing) {
      const p = f / 14;
      const thrust = p < 0.5 ? p/0.5 : 1-(p-0.5)/0.5;
      return {rot: facing===1?-20:20, tx:(facing===1?1:-1)*22*thrust, ty:-6*thrust, sc:1, reach:18*thrust};
    }
  },
  // Heavy swing: overhead slam
  slam: {
    frames: 22, sfxVariant: 'slam',
    getTransform(f, facing) {
      const p = f / 22;
      const wind = p < 0.3 ? p/0.3 : 0;
      const swing = p >= 0.3 ? (p-0.3)/0.7 : 0;
      return {rot: facing===1 ? -80*wind + 160*swing : 80*wind - 160*swing, tx:0, ty:6*swing, sc:1+0.2*Math.max(0,swing-0.5)*2, reach:12*swing};
    }
  },
  // Spin attack: 360 rotation
  spin: {
    frames: 20, sfxVariant: 'slash',
    getTransform(f, facing) {
      const p = f / 20;
      return {rot: p*360*(facing===1?1:-1), tx: Math.sin(p*Math.PI*2)*8, ty:-Math.abs(Math.sin(p*Math.PI))*6, sc:1+0.1*Math.sin(p*Math.PI), reach:10};
    }
  },
  // Shoot/recoil: gun recoil
  shoot: {
    frames: 14, sfxVariant: 'shoot',
    getTransform(f, facing) {
      const p = f / 14;
      const kick = p < 0.2 ? p/0.2 : p < 0.5 ? 1-(p-0.2)/0.3 : 0;
      return {rot: facing===1?-5+kick*-12:5+kick*12, tx:(facing===1?-1:1)*kick*6, ty:kick*3, sc:1, reach:0};
    }
  },
  // Throw: overhead arc
  throw: {
    frames: 16, sfxVariant: 'throw',
    getTransform(f, facing) {
      const p = f / 16;
      const arc = Math.sin(p * Math.PI);
      return {rot: facing===1?-90*p:90*p, tx:(facing===1?1:-1)*20*p, ty:-10*arc, sc:1-0.3*p, reach:20*p};
    }
  },
  // Magic: glow burst
  magic: {
    frames: 18, sfxVariant: 'magic',
    getTransform(f, facing) {
      const p = f / 18;
      const pulse = Math.sin(p * Math.PI * 3) * 0.15;
      return {rot: Math.sin(p*Math.PI*4)*(facing===1?15:-15), tx:Math.sin(p*Math.PI*2)*4, ty:-5*Math.sin(p*Math.PI), sc:1+pulse, reach:14*Math.sin(p*Math.PI)};
    }
  },
  // Bob default
  bob: {
    frames: 12, sfxVariant: 'slash',
    getTransform(f, facing) {
      const p = f / 12;
      const s = Math.sin(p * Math.PI);
      return {rot: facing===1?-40*s:40*s, tx:(facing===1?1:-1)*8*s, ty:-4*s, sc:1+0.05*s, reach:8*s};
    }
  }
};

// Map weapon category to attack animation
function getAttackAnimType(weapId) {
  if (!weapId || !ITEM_DB[weapId]) return 'bob';
  const db = ITEM_DB[weapId];
  const cat = db.category;
  const id = weapId;
  // Special cases
  if (id==='magic_staff') return 'magic';
  if (id==='war_sling') return 'spin';
  if (id==='battle_axe'||id==='war_hammer'||id==='iron_mace') return 'slam';
  if (id==='javelin'||id==='war_sling') return 'throw';
  if (id==='dagger'||id==='short_sword'||id==='golden_dagger') return 'slash';
  if (id==='war_spear'||id==='halberd'||id==='trident') return 'stab';
  if (id==='katana'||id==='long_sword'||id==='war_scythe'||id==='chain_flail') return 'spin';
  if (id==='sword_shield') return 'stab';
  if (cat==='ranged'||cat==='modern'||cat==='explosive') return 'shoot';
  if (cat==='melee') return 'slash';
  return 'bob';
}

  animWardPreview();
}
function closeOverlay(){
  overlayOpen=false;
  document.getElementById('overlayScreen').classList.remove('active');
}
function switchOvTab(tab){
  currentOvTab=tab;
  document.querySelectorAll('.ov-tab').forEach((el,i)=>{el.classList.toggle('active',['inventory','wardrobe','weapons'][i]===tab);});
  document.getElementById('ovTitle').textContent=tab==='inventory'?'✦ INVENTORI ✦':tab==='wardrobe'?'✦ LEMARI PAKAIAN ✦':'✦ ARSENAL PIXEL ✦';
  renderOverlay();
}
function renderOverlay(){
  const body=document.getElementById('ovBody');
  if(currentOvTab==='inventory') body.innerHTML=buildInventoryUI();
  else if(currentOvTab==='wardrobe') body.innerHTML=buildWardrobeUI();
  else body.innerHTML=buildWeaponUI();
  bindOverlayEvents();
}

// ---- INVENTORY UI ----
function buildInventoryUI(){
  const slots=[];
  // 25 slots total
  for(let i=0;i<25;i++){
    const it=inventory.items[i];
    if(it&&ITEM_DB[it.id]){
      const db=ITEM_DB[it.id];
      const isEq=Object.values(inventory.equipped).includes(it.id);
      const isSel=selectedInvSlot===i;
      slots.push(`<div class="inv-slot has-item${isEq?' equipped':''}${isSel?' selected':''}" onclick="selectInvSlot(${i})">
        ${isEq?'<span class="slot-eq">★</span>':''}
        <span class="slot-icon">${db.icon}</span>
        <span class="slot-name">${db.name}</span>
        ${it.qty>1?`<span class="slot-qty">x${it.qty}</span>`:''}
      </div>`);
    } else {
      slots.push(`<div class="inv-slot" onclick="selectInvSlot(${i})"></div>`);
    }
  }
  const det=buildItemDetail();
  const stats=getEquippedStats();
  return `
    <div class="inv-grid">${slots.join('')}</div>
    <div class="inv-detail">
      <div style="font-size:5px;color:#446655;margin-bottom:6px">STATISTIK</div>
      <div class="inv-det-stats">⚔ ATK: ${stats.atk}<br>🛡 DEF: ${stats.def}<br>💨 SPD: ${stats.spd}<br>💰 EMAS: ${inventory.gold}</div>
      <hr style="border:none;border-top:1px solid #1a3322;margin:4px 0">
      ${det}
    </div>`;
}

function buildItemDetail(){
  if(selectedInvSlot===null||!inventory.items[selectedInvSlot])return`<div style="font-size:5px;color:#334433;text-align:center;margin-top:20px">Pilih item</div>`;
  const it=inventory.items[selectedInvSlot],db=ITEM_DB[it.id];
  if(!db)return'';
  const isEq=inventory.equipped[db.slot]===it.id;
  const canEquip=db.slot!==null;
  const canUse=db.type==='consumable';
  return`
    <div class="inv-det-icon">${db.icon}</div>
    <div class="inv-det-name">${db.name}</div>
    <div class="inv-det-type">${db.type.toUpperCase()}${db.slot?' • '+db.slot.toUpperCase():''}</div>
    <div class="inv-det-desc">${db.desc}</div>
    ${db.atk||db.def||db.spd?`<div class="inv-det-stats">${db.atk?`⚔ +${db.atk}ATK `:''} ${db.def?`🛡 +${db.def}DEF `:''}${db.spd?`💨 ${db.spd>0?'+':''}${db.spd}SPD`:''}</div>`:''}
    ${canEquip?`<button class="inv-det-btn${isEq?' red':''}" onclick="toggleEquip('${it.id}')">${isEq?'✕ LEPAS':'✓ PAKAI'}</button>`:''}
    ${canUse?`<button class="inv-det-btn" onclick="useItem('${it.id}')">▶ GUNAKAN</button>`:''}
    <button class="inv-det-btn red" style="margin-top:2px" onclick="dropItem(${selectedInvSlot})">🗑 BUANG</button>`;
}

function selectInvSlot(i){selectedInvSlot=i;sfxSelect();renderOverlay();}
function toggleEquip(id){
  const db=ITEM_DB[id];if(!db||!db.slot)return;
  if(inventory.equipped[db.slot]===id){inventory.equipped[db.slot]=null;}
  else{inventory.equipped[db.slot]=id;}
  sfxEquip();
  // Sync charConfig with equipped outfit/shoe color
  if(db.slot==='body'&&db.color)charConfig.outfitColor=db.color;
  if(db.slot==='feet'&&db.color)charConfig.shoeColor=db.color;
  renderOverlay();
}
function useItem(id){
  const db=ITEM_DB[id];if(!db||db.type!=='consumable')return;
  if(db.name.includes('HP')||db.name.includes('Roti')){vPlayer.hp=Math.min(vPlayer.maxHp,vPlayer.hp+(db.name.includes('HP')?30:10));notification={text:db.icon+' +HP! ('+db.name+')',timer:90};}
  // Remove one qty
  const it=inventory.items.find(x=>x.id===id);if(it){it.qty--;if(it.qty<=0)inventory.items=inventory.items.filter(x=>x.id!==id);}
  sfxEquip();selectedInvSlot=null;renderOverlay();
}
function dropItem(i){
  inventory.items.splice(i,1);selectedInvSlot=null;sfxSelect();renderOverlay();
}

function drawWeaponDetailCanvas() {
  if (!selectedWeaponId) return;
  const c = document.getElementById('wdCanvas');
  if (!c) return;
  const ctx2 = c.getContext('2d');
  const db = ITEM_DB[selectedWeaponId];
  if (!db) return;
  const canvasId = WEAPON_CANVAS_MAP[selectedWeaponId] || 'dagger';
  const animType = WEAPON_ANIM_MAP[selectedWeaponId] || 'bob';
  const anim = getWeapAnim('detail_'+selectedWeaponId, animType);
  ctx2.clearRect(0,0,48,48);
  ctx2.save();
  ctx2.translate(24+anim.tx, 24+anim.ty);
  ctx2.rotate(anim.rot * Math.PI/180);
  ctx2.scale(anim.sc, anim.sc);
  ctx2.translate(-24, -24);
  // Draw at 48x48 scale (scale factor ~0.75 of 64)
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = 64; tmpCanvas.height = 64;
  const tmpCtx = tmpCanvas.getContext('2d');
  drawPixelWeapon(tmpCtx, canvasId, 1);
  ctx2.drawImage(tmpCanvas, -8, -8, 64, 64);
  ctx2.restore();
}

let weaponGridAnimRunning = false;
function initWeaponCanvases() {
  const allWeapons = Object.entries(ITEM_DB).filter(([,db])=>db.type==='weapon');
  allWeapons.forEach(([id])=>{
    const c = document.getElementById('wc_'+id);
    if (!c) return;
    const ctx2 = c.getContext('2d');
    const canvasId = WEAPON_CANVAS_MAP[id] || 'dagger';
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = 64; tmpCanvas.height = 64;
    const tmpCtx = tmpCanvas.getContext('2d');
    drawPixelWeapon(tmpCtx, canvasId, 1);
    ctx2.clearRect(0,0,32,32);
    ctx2.drawImage(tmpCanvas, -16, -16, 64, 64);
  });
}

function animateWeaponGrid() {
  if (!overlayOpen || currentOvTab !== 'weapons') { weaponGridAnimRunning = false; return; }
  weaponGridAnimRunning = true;
  // Animate detail canvas
  if (selectedWeaponId) drawWeaponDetailCanvas();
  // Animate grid canvases with their animations
  const allWeapons = Object.entries(ITEM_DB).filter(([,db])=>db.type==='weapon');
  allWeapons.forEach(([id])=>{
    const c = document.getElementById('wc_'+id);
    if (!c) return;
    const ctx2 = c.getContext('2d');
    const canvasId = WEAPON_CANVAS_MAP[id] || 'dagger';
    const animType = WEAPON_ANIM_MAP[id] || 'bob';
    const anim = getWeapAnim(id, animType);
    ctx2.clearRect(0,0,32,32);
    ctx2.save();
    ctx2.translate(16+anim.tx*0.5, 16+anim.ty*0.5);
    ctx2.rotate((anim.rot * Math.PI/180)*0.5);
    ctx2.scale(anim.sc, anim.sc);
    ctx2.translate(-16,-16);
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = 64; tmpCanvas.height = 64;
    const tmpCtx = tmpCanvas.getContext('2d');
    drawPixelWeapon(tmpCtx, canvasId, 1);
    ctx2.drawImage(tmpCanvas, -16, -16, 64, 64);
    ctx2.restore();
  });
  requestAnimationFrame(animateWeaponGrid);
}

function bindOverlayEvents(){
  setTimeout(()=>{
    drawWardCanvas();
    if(currentOvTab==='weapons'){
      initWeaponCanvases();
      if(selectedWeaponId) drawWeaponDetailCanvas();
      if(!weaponGridAnimRunning) animateWeaponGrid();
    }
  },20);
}

// Ward canvas preview
const wardCanvasEl={el:null,ctx:null};
function getWardCanvas(){
  wardCanvasEl.el=document.getElementById('wardCanvas');
  if(wardCanvasEl.el)wardCanvasEl.ctx=wardCanvasEl.el.getContext('2d');

}
function drawWardCanvas(){
  const wc=getWardCanvas();if(!wc.el||!wc.ctx)return;
  const wctx=wc.ctx;wctx.clearRect(0,0,70,100);
  const cfg=charConfig,isFemale=cfg.gender==='female';
  const cx=35,cy=60;
  const bw=isFemale?12:14,bh=isFemale?14:12;
  const hw=isFemale?10:12,hh=isFemale?11:10;
  const legW=isFemale?4:5;
  // Shadow
  wctx.globalAlpha=.25;wctx.fillStyle='#000';wctx.beginPath();wctx.ellipse(cx,cy+16,10,3,0,0,Math.PI*2);wctx.fill();wctx.globalAlpha=1;
  // Body
  wctx.fillStyle=cfg.outfitColor;wctx.fillRect(cx-bw/2,cy-2,bw,bh+2);
  // Jacket center seam
  wctx.fillStyle=blendColor(cfg.outfitColor,-35);wctx.fillRect(cx-1,cy-1,2,bh);
  // Jacket buttons (yellow like Alex)
  wctx.fillStyle='#ddaa22';wctx.fillRect(cx,cy+1,1,1);wctx.fillRect(cx,cy+4,1,1);wctx.fillRect(cx,cy+7,1,1);
  // Legs (blue pants for Alex)
  const wPantsColor=(cfg.outfitColor==='#3a6a2a'||cfg.outfitColor==='#4a8a4a')?'#2a4a8c':blendColor(cfg.outfitColor,-40);
  wctx.fillStyle=wPantsColor;
  wctx.fillRect(cx-legW-1,cy+bh,legW,8);wctx.fillRect(cx+1,cy+bh,legW,8);
  // Shoes
  wctx.fillStyle=cfg.shoeColor;wctx.fillRect(cx-legW-2,cy+bh+6,legW+2,3);wctx.fillRect(cx,cy+bh+6,legW+2,3);
  // Arms
  wctx.fillStyle=cfg.skinTone;const armW=isFemale?3:4;
  wctx.fillRect(cx-bw/2-armW-1,cy-1,armW,10);wctx.fillRect(cx+bw/2+1,cy-1,armW,10);
  // Neck
  wctx.fillStyle=cfg.skinTone;wctx.fillRect(cx-2,cy-5,4,4);
  // Head
  wctx.fillStyle=cfg.skinTone;wctx.fillRect(cx-hw/2,cy-hh-5,hw,hh);
  // Eyes glow
  const eg=(Math.sin(Date.now()*.003)+1)*.5;
  wctx.globalAlpha=.5+eg*.5;wctx.fillStyle=cfg.eyeColor;
  wctx.fillRect(cx-3,cy-hh-5+3,2,2);wctx.fillRect(cx+1,cy-hh-5+3,2,2);
  wctx.globalAlpha=1;
  // Hair
  drawWardHair(wctx,cx,cy-hh-5,hw,hh,cfg.hairStyle,cfg.hairColor,isFemale);
  // Face extras
  if(cfg.faceStyle===3){wctx.fillStyle=cfg.hairColor;wctx.fillRect(cx-4,cy-hh-5+7,8,2);}
  if(cfg.faceStyle===5){wctx.strokeStyle='#888';wctx.lineWidth=1;wctx.strokeRect(cx-4,cy-hh-5+2,4,4);wctx.strokeRect(cx+1,cy-hh-5+2,4,4);}
  // Aura
  wctx.globalAlpha=.04+eg*.04;wctx.fillStyle=cfg.eyeColor;
  wctx.beginPath();wctx.ellipse(cx,cy,8,14,0,0,Math.PI*2);wctx.fill();wctx.globalAlpha=1;
  // Weapon in hand (pixel art)
  const weap=inventory.equipped.weapon;
  if(weap&&ITEM_DB[weap]){
    const canvasId = WEAPON_CANVAS_MAP[weap] || 'dagger';
    const animType = WEAPON_ANIM_MAP[weap] || 'bob';
    const anim = getWeapAnim('hand_'+weap, animType);
    wctx.save();
    const hx = cx+bw/2+armW+6, hy = cy+4;
    wctx.translate(hx + anim.tx*0.3, hy + anim.ty*0.3);
    wctx.rotate((anim.rot*Math.PI/180)*0.3);
    wctx.scale(anim.sc*0.32, anim.sc*0.32);
    wctx.translate(-32,-32);
    const tmp = document.createElement('canvas'); tmp.width=64; tmp.height=64;
    drawPixelWeapon(tmp.getContext('2d'), canvasId, 1);
    wctx.drawImage(tmp, 0, 0);
    wctx.restore();
  }
}
function drawWardHair(wctx,x,topY,hw,hh,style,color,isFemale){
  wctx.fillStyle=color;
  const s=[
    ()=>{wctx.fillRect(x-hw/2,topY,hw,4);wctx.fillRect(x-hw/2-2,topY+1,3,5);wctx.fillRect(x+hw/2-1,topY+1,3,5);wctx.fillStyle=blendColor(color,25);wctx.fillRect(x-1,topY,3,1);wctx.fillStyle=color;},
    ()=>{wctx.fillRect(x-hw/2,topY,hw,3);wctx.fillRect(x-hw/2-2,topY+2,3,18);wctx.fillRect(x+hw/2-1,topY+2,3,18);},
    ()=>{for(let i=0;i<4;i++)wctx.fillRect(x-hw/2+i*(hw/4),topY-3+i%2*2,2,6);wctx.fillRect(x-hw/2,topY,hw,3);},
    ()=>{wctx.fillRect(x-hw/2,topY,hw,3);for(let i=0;i<3;i++){wctx.fillRect(x-hw/2-2+i*2,topY+2,3,3);wctx.fillRect(x-hw/2-1+i*3,topY+4,2,3);}},
    ()=>{wctx.fillStyle=blendColor(color,20);wctx.fillRect(x-hw/2,topY,hw,2);},
    ()=>{wctx.fillRect(x-hw/2,topY,hw,3);wctx.fillRect(x+hw/2-1,topY+3,4,16);},
    ()=>{for(let i=0;i<3;i++)wctx.fillRect(x-2+i*2,topY-6+i*2,3,6);wctx.fillRect(x-hw/2,topY,hw,3);},
    ()=>{wctx.fillRect(x-hw/2,topY,hw,4);wctx.fillRect(x-hw/2-2,topY+3,3,22);wctx.fillRect(x+hw/2-1,topY+3,3,22);wctx.fillRect(x-hw/2,topY+14,hw,10);},
  ];
  if(s[style])s[style]();
}

const previewCanvas=document.getElementById('previewCanvas');
const pctx=previewCanvas.getContext('2d');
function drawPreviewChar(){
  pctx.clearRect(0,0,80,110);
  const cfg=charConfig,isFemale=cfg.gender==='female';
  // Stardew-style proportions (scaled up for preview canvas)
  const bw=isFemale?14:16, bh=isFemale?15:14;
  const hw=isFemale?14:16, hh=isFemale?13:14;
  const legW=5, legH=10, shoeW=8, shoeH=3;
  const armW=4;
  // Anchor: foot at cy=78
  const cx=40, footY=78;

  // Shadow
  pctx.globalAlpha=.25;pctx.fillStyle='#000';pctx.beginPath();pctx.ellipse(cx,footY+3,13,4,0,0,Math.PI*2);pctx.fill();pctx.globalAlpha=1;

  // Shoes
  const shoeY=footY-shoeH;
  pctx.fillStyle=cfg.shoeColor;
  pctx.fillRect(cx-legW-3, shoeY, shoeW, shoeH);
  pctx.fillRect(cx+1,      shoeY, shoeW, shoeH);
  pctx.fillStyle=blendColor(cfg.shoeColor,-40);
  pctx.fillRect(cx-legW-3, shoeY, 1, shoeH);
  pctx.fillRect(cx+1,      shoeY, 1, shoeH);

  // Pants
  const pantsColor=(cfg.outfitColor==='#3a6a2a'||cfg.outfitColor==='#4a8a4a')?'#2a4a8c':blendColor(cfg.outfitColor,-45);
  const legTopY=shoeY-legH;
  pctx.fillStyle=pantsColor;
  pctx.fillRect(cx-legW-2, legTopY, legW, legH);
  pctx.fillRect(cx+1,      legTopY, legW, legH);
  pctx.fillStyle=blendColor(pantsColor,20);
  pctx.fillRect(cx-legW-1, legTopY, 1, legH);
  pctx.fillRect(cx+2,      legTopY, 1, legH);

  // Body jacket
  const bTop=legTopY-bh;
  pctx.fillStyle=cfg.outfitColor;
  pctx.fillRect(cx-bw/2, bTop, bw, bh);
  pctx.fillStyle=blendColor(cfg.outfitColor,-25);
  pctx.fillRect(cx-bw/2, bTop+bh-2, bw, 2);
  pctx.fillStyle=blendColor(cfg.outfitColor,20);
  pctx.fillRect(cx-bw/2, bTop, bw, 1);
  pctx.fillStyle=blendColor(cfg.outfitColor,-40);
  pctx.fillRect(cx-1, bTop+1, 2, bh-2);
  pctx.fillStyle='#ddaa22';
  pctx.fillRect(cx, bTop+2, 2, 2);
  pctx.fillRect(cx, bTop+7, 2, 2);
  pctx.fillRect(cx, bTop+12, 2, 2);

  // Arms (sleeves + skin)
  pctx.fillStyle=blendColor(cfg.outfitColor,-10);
  pctx.fillRect(cx-bw/2-armW-1, bTop+1, armW+1, 7); // left sleeve
  pctx.fillRect(cx+bw/2,        bTop+1, armW+1, 7); // right sleeve
  pctx.fillStyle=cfg.skinTone;
  pctx.fillRect(cx-bw/2-armW-1, bTop+8, armW, 7);   // left hand
  pctx.fillRect(cx+bw/2,        bTop+8, armW, 7);   // right hand

  // Neck
  pctx.fillStyle=cfg.skinTone;
  pctx.fillRect(cx-3, bTop-5, 6, 6);

  // Head
  const hTop=bTop-5-hh;
  pctx.fillStyle=cfg.skinTone;
  pctx.fillRect(cx-hw/2, hTop, hw, hh);
  pctx.fillStyle=blendColor(cfg.skinTone,-20);
  pctx.fillRect(cx+hw/2-3, hTop+1, 3, hh-2);
  pctx.fillRect(cx-hw/2+1, hTop+hh-3, hw-2, 3);

  // Eyes
  const eyeY=hTop+Math.floor(hh*0.42);
  pctx.fillStyle='#111';
  pctx.fillRect(cx-5, eyeY, 4, 4);
  pctx.fillRect(cx+2, eyeY, 4, 4);
  pctx.fillStyle=cfg.eyeColor;
  pctx.fillRect(cx-4, eyeY+1, 3, 3);
  pctx.fillRect(cx+3, eyeY+1, 3, 3);
  pctx.fillStyle='#fff';
  pctx.fillRect(cx-3, eyeY+1, 1, 1);
  pctx.fillRect(cx+4, eyeY+1, 1, 1);

  // Nose hint
  pctx.fillStyle=blendColor(cfg.skinTone,-25);
  pctx.fillRect(cx, eyeY+5, 2, 2);

  // Mouth
  pctx.fillStyle=blendColor(cfg.skinTone,-40);
  pctx.fillRect(cx-2, eyeY+9, 5, 2);

  // Hair
  drawPreviewHair(cx,hTop,hw,hh,cfg.hairStyle,cfg.hairColor,isFemale);

  // Eye glow
  const glow=(Math.sin(Date.now()*.003)+1)*.5;
  pctx.globalAlpha=.15+glow*.15;pctx.fillStyle=cfg.eyeColor;pctx.beginPath();pctx.ellipse(cx,hTop+hh/2,10,12,0,0,Math.PI*2);pctx.fill();pctx.globalAlpha=1;
}
function drawPreviewHair(x,topY,hw,hh,style,color,isFemale){

// ===================== DEATH/VOID/REBORN =====================
let deathTimer=0,deathAlpha=0,deathBlood=[];
const deathLines=[{text:"Kau mati.",color:'#ff3333',delay:60},{text:"Duniamu telah berakhir.",color:'#cc2222',delay:130},{text:"Namun...",color:'#888',delay:230},{text:"Sesuatu memanggilmu.",color:'#aaffcc',delay:310}];
let deathTextAlpha={};
function initDeath(){deathBlood=Array.from({length:30},(_,i)=>({x:180+noise(i,0,1)*120,y:100+noise(i,0,2)*80,r:2+noise(i,0,3)*8,spread:noise(i,0,4)*20}));}
function updateDeath(){deathTimer++;if(deathTimer<30)deathAlpha=deathTimer/30;for(let i=0;i<deathLines.length;i++){const l=deathLines[i];if(deathTimer>l.delay)deathTextAlpha[i]=clamp((deathTimer-l.delay)/40,0,1);}if(deathTimer>420){deathAlpha=1-(deathTimer-420)/60;if(deathAlpha<=0){scene=SCENES.VOID;tick=0;deathAlpha=0;}}}
function renderDeath(){ctx.globalAlpha=deathAlpha;drawRect(0,0,480,320,'#0a0000');for(let b of deathBlood){ctx.globalAlpha=deathAlpha*.6;ctx.fillStyle='#330000';ctx.beginPath();ctx.ellipse(b.x,b.y,b.r+b.spread*.3,b.r*.5,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=deathAlpha*.8;ctx.fillStyle='#660000';ctx.beginPath();ctx.ellipse(b.x,b.y,b.r,b.r*.6,0,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;for(let i=0;i<deathLines.length;i++){if(deathTextAlpha[i]>0){ctx.globalAlpha=deathTextAlpha[i]*deathAlpha;pixelText(deathLines[i].text,240,60+i*30,8,deathLines[i].color,'center');}}ctx.globalAlpha=1;}
let voidTimer=0,voidAlpha=0;
const voidLines=[{text:"Kegelapan...",delay:30,dur:100},{text:"Keheningan...",delay:150,dur:100},{text:"Lalu...",delay:280,dur:80},{text:"CAHAYA.",delay:380,dur:999}];
let voidTextAlpha={},soulTrails=[],lightBurst=0;
function updateVoid(){voidTimer++;voidAlpha=clamp(voidTimer/40,0,1);if(voidTimer%3===0&&voidTimer>60){soulTrails.push({x:Math.random()*480,y:330,vy:-(1+Math.random()*2),life:80+Math.random()*60,maxLife:140,color:`hsl(${160+Math.random()*40},80%,${60+Math.random()*20}%)`});}soulTrails=soulTrails.filter(s=>s.life>0);for(let s of soulTrails){s.y+=s.vy;s.x+=Math.sin(voidTimer*.03+s.x)*.5;s.life--;}for(let i=0;i<voidLines.length;i++){const l=voidLines[i];if(voidTimer>l.delay){const e=voidTimer-l.delay;if(e<40)voidTextAlpha[i]=e/40;else if(e<l.dur)voidTextAlpha[i]=1;else if(e<l.dur+40)voidTextAlpha[i]=1-(e-l.dur)/40;else voidTextAlpha[i]=0;}}if(voidTimer>390)lightBurst=clamp((voidTimer-390)/50,0,1);if(voidTimer>470){scene=SCENES.REBORN;tick=0;}}
function renderVoid(){ctx.globalAlpha=voidAlpha;drawRect(0,0,480,320,'#000008');drawStars(voidAlpha);for(let s of soulTrails){ctx.globalAlpha=(s.life/s.maxLife)*voidAlpha*.7;drawRect(Math.floor(s.x),Math.floor(s.y),1,4,s.color);}ctx.globalAlpha=1;if(voidTimer>200){const op=(Math.sin(voidTimer*.04)+1)*.5,oa=clamp((voidTimer-200)/80,0,1)*voidAlpha;const or2=8+op*4;ctx.globalAlpha=oa*.15;ctx.fillStyle='#88ffcc';ctx.beginPath();ctx.arc(240,160,or2*6,0,Math.PI*2);ctx.fill();ctx.globalAlpha=oa*.3;ctx.beginPath();ctx.arc(240,160,or2*2.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=oa;ctx.fillStyle='#ccffee';ctx.beginPath();ctx.arc(240,160,or2,0,Math.PI*2);ctx.fill();}if(lightBurst>0){ctx.globalAlpha=lightBurst*voidAlpha*.8;const g=ctx.createRadialGradient(240,160,0,240,160,200);g.addColorStop(0,'#fff');g.addColorStop(.3,'#88ffcc');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,480,320);}for(let i=0;i<voidLines.length;i++){if(voidTextAlpha[i]>0){ctx.globalAlpha=voidTextAlpha[i]*voidAlpha;const isLast=i===voidLines.length-1;pixelText(voidLines[i].text,240,260,isLast?12:8,isLast?'#fff':'#aaaacc','center');}}ctx.globalAlpha=1;}
let rebornTimer=0,rebornAlpha=0;
const rebornNarrative=[{text:'"Kau dipilih."',delay:20,y:80,size:7,color:'#ccffee'},{text:'"Dunia lain membutuhkanmu."',delay:100,y:105,size:6,color:'#aaddcc'},{text:'"Kau tidak membawa apa-apa."',delay:200,y:130,size:6,color:'#aaaacc'},{text:'"Hanya jiwa dan nalurimu."',delay:290,y:153,size:6,color:'#aaaacc'},{text:'"Bertahan. Berkembang."',delay:380,y:185,size:8,color:'#ffeeaa'},{text:'"Jadilah legenda."',delay:460,y:210,size:9,color:'#fff'}];
let rebornTextAlpha={},rebornSoulX=240,rebornSoulY=-30;
function updateReborn(){rebornTimer++;rebornAlpha=clamp(rebornTimer/30,0,1);if(rebornTimer>30){rebornSoulY=lerp(rebornSoulY,160,.015);rebornSoulX=240+Math.sin(rebornTimer*.04)*20;}for(let i=0;i<rebornNarrative.length;i++){const l=rebornNarrative[i];if(rebornTimer>l.delay)rebornTextAlpha[i]=clamp((rebornTimer-l.delay)/40,0,1);}if(rebornTimer===660)showCustomScreen();}
function renderReborn(){const fp=clamp((rebornTimer-30)/400,0,1);drawRect(0,0,480,320,lerpColor('#000010','#0a1a2a',fp));drawStars(rebornAlpha*(1-fp*.7));if(fp>.3){ctx.globalAlpha=clamp((fp-.3)/.7,0,1)*.6;const g=ctx.createLinearGradient(0,200,0,320);g.addColorStop(0,'transparent');g.addColorStop(1,'#2a5a1a');ctx.fillStyle=g;ctx.fillRect(0,0,480,320);ctx.globalAlpha=1;}if(rebornTimer>30){const pulse=(Math.sin(rebornTimer*.08)+1)*.5;ctx.globalAlpha=.1;ctx.fillStyle='#88ffcc';ctx.beginPath();ctx.arc(rebornSoulX,rebornSoulY,30+pulse*5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.4;ctx.beginPath();ctx.arc(rebornSoulX,rebornSoulY,12+pulse*2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle='#ccffee';ctx.beginPath();ctx.arc(rebornSoulX,rebornSoulY,5,0,Math.PI*2);ctx.fill();}for(let i=0;i<rebornNarrative.length;i++){if(rebornTextAlpha[i]>0){const l=rebornNarrative[i];ctx.globalAlpha=rebornTextAlpha[i];pixelText(l.text,242,l.y+2,l.size,'#000033','center');pixelText(l.text,240,l.y,l.size,l.color,'center');}}ctx.globalAlpha=1;}

// ===================== VILLAGE MODULE LOADER =====================
// Setelah pembuatan karakter: simpan ke localStorage lalu redirect ke desa.html
window.startVillageScene = function() {
  const slot = parseInt(localStorage.getItem('reborn_new_char_slot') || '0');
  const charData = {
    ...charConfig,
    slot,
    gold: inventory.gold,
    equipped: inventory.equipped,
    items: inventory.items,
    hp: 100,
    maxHp: 100,
    level: 1,
    lastSaved: Date.now(),
  };

  // Simpan data lengkap karakter untuk desa.html
  localStorage.setItem('reborn_charConfig', JSON.stringify(charConfig));
  localStorage.setItem('reborn_inventory', JSON.stringify({
    gold: inventory.gold,
    equipped: inventory.equipped,
    items: inventory.items,
  }));
  localStorage.setItem('reborn_slot', String(slot));

  // Simpan juga untuk index.html (slot select screen)
  localStorage.setItem('reborn_save_new_char', JSON.stringify(charData));
  localStorage.setItem('reborn_save_new_char_slot', String(slot));

  // Simpan ke Firebase jika tersedia
  if (window.saveCharacterToFirebase) {
    window.saveCharacterToFirebase({ ...charConfig, slot });
  }

  console.log('[karakter.html] Karakter disimpan, pindah ke desa.html. Slot:', slot, 'Nama:', charConfig.name);
  window.location.href = 'desa.html';
};

// ===================== MULAI: Cek apakah slot baru atau kembali dari index =====================
(function initKarakter() {
  const params = new URLSearchParams(window.location.search);
  const slotParam = params.get('slot');

  if (slotParam !== null) {
    // Dibuka dari index.html untuk buat karakter baru di slot ini
    // Langsung tampilkan layar pembuatan karakter (skip death cinematic)
    console.log('[karakter.html] Mode: buat karakter baru di slot', slotParam);
    showCustomScreen();
  } else {
    // Dibuka tanpa parameter — jalankan death cinematic normal
    console.log('[karakter.html] Mode: death cinematic');
    initDeath();
    (function loop(ts) {
      const dt = Math.min((ts - (loop._last || ts)) / 1000, 0.05);
      loop._last = ts;
      tick++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      switch(scene) {
        case SCENES.DEATH:   updateDeath(); renderDeath(); break;
        case SCENES.VOID:    updateVoid();  renderVoid();  break;
        case SCENES.REBORN:  updateReborn();renderReborn();break;
      }
      updateP(dt);
      requestAnimationFrame(loop);
    })(0);
  }
})();
